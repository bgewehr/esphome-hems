# Netzdienliche Steuerung — §14a-Anwendungslogik auf CS-Limit-Ereignisse.
#
# Teil 1: Anwendungs-Glue — Relay, LED, CT-Addon und Ereigniszähler auf die
#         EEBus-CS-Trigger verdrahtet (Trigger-Listen mergen über Packages
#         mit eebus-cs.yaml — Plugin-Pattern).
# Teil 2: §14a Budget-Verteilung — teilt das CS-Limit auf die steuerbaren
#         Geräte auf. Konzept: docs/power-distribution-concept.md
#         (strikte Priorität mit Sockeln).
#
#         Budget = P_Limit(VNB) + 0.8 × PV-Leistung  (Saldierung, 20 %
#                  Sicherheitsmarge; Batterie-Entladung noch nicht angerechnet)
#         Runde 1: jedem verbundenen Gerät in Prioritätsreihenfolge seinen
#                  Sockel (Min). Runde 2: Rest bis zum Deckel (Max).
#         Betreiber-Parameter (Priorität/Min/Max) liegen bei den Instanzen:
#         eebus-eg-1.yaml / eebus-eg-2.yaml, unterhalb der Failsafe-Optionen.
#         Der EV-Ladepfad (ct*addon + relay_1) hat eine eigene feste
#         Begrenzung und wird erst in V2 in die Verteilung integriert.
#
# Requires: hems_cs, relay_1, power_limit_events, last_enwg_event, sg_netz
#           (eebus-cs.yaml), hems_eg1 (eebus-eg-1.yaml), hems_eg2
#           (eebus-eg-2.yaml), fronius_solar_power (fronius-gen24.yaml),
#           ct1addon..ct3addon, ladebegrenzung_addon (xemex-csmb.yaml),
#           status_led, ha_time (esphome-hems.yaml)

eebus_cs:
  id: hems_cs
  on_limit_active:
    - lambda: |-
        float _ev = id(power_limit_events).state;
        id(power_limit_events).publish_state(std::isnan(_ev) ? 1.0f : _ev + 1.0f);
    - text_sensor.template.publish:
        id: last_enwg_event
        state: !lambda 'return std::string("Aktiviert (EEBus): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
    # CT-Addons setzt der Budget-Verteiler aus dem EV-Anteil (distribute_budget)
    - light.turn_on:
        id: status_led
        effect: "Paragraph14a Warning Flash"
    - switch.turn_on: relay_1
    - script.execute: distribute_budget
  on_limit_cleared:
    - text_sensor.template.publish:
        id: last_enwg_event
        state: !lambda 'return std::string("Beendet (EEBus): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
    - number.set:
        id: ct1addon
        value: !lambda "return id(ladebegrenzung_addon);"
    - number.set:
        id: ct2addon
        value: !lambda "return id(ladebegrenzung_addon);"
    - number.set:
        id: ct3addon
        value: !lambda "return id(ladebegrenzung_addon);"
    - light.turn_off:
        id: status_led
    - switch.turn_off: relay_1
    - lambda: |-
        id(budget_last_eg1) = -1.0f;
        id(budget_last_eg2) = -1.0f;
        id(budget_last_ev)  = -1.0f;
        id(hems_eg1).clear_limit();
        id(hems_eg2).clear_limit();
        id(budget_distribution_status).publish_state("kein Limit aktiv");

globals:
  # zuletzt gesendete Anteile — Hysterese (>100 W) und Neusenden nach Aktivierung
  - id: budget_last_eg1
    type: float
    initial_value: '-1.0f'
  - id: budget_last_eg2
    type: float
    initial_value: '-1.0f'
  - id: budget_last_ev
    type: float
    initial_value: '-1.0f'

text_sensor:
  # --- aktueller Verteilstand (sg_netz, weight 7) ---
  - platform: template
    name: "${device_name} Budget-Verteilung"
    id: budget_distribution_status
    icon: "mdi:chart-pie"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 7
    update_interval: never

script:
  - id: distribute_budget
    mode: single
    then:
      - lambda: |-
          if (!id(hems_cs).is_limit_active()) return;

          const float limit = id(hems_cs).current_limit_w();
          float pv = id(fronius_solar_power).state;
          if (std::isnan(pv) || pv < 0.0f) pv = 0.0f;
          float budget = limit + 0.8f * pv;

          // Drei steuerbare Verbraucher: WP (EG1), EV (Xemex CSMB), WB (EG2).
          // kind 0 = EEBus-EG-Instanz, kind 1 = EV-Ladepfad (CT-Addons)
          struct Dev {
            const char* tag;
            int kind;
            esphome::eebus_eg::EebusEgComponent* eg;
            float prio, pmin, pmax, share;
          };
          // EV-Deckel: Budget-Max UND manueller Slider (Nutzerwunsch) gelten beide
          float ev_cap = std::min(id(ev_budget_max).state, id(ev_limit_w).state);
          Dev devs[3] = {
            { "WP", 0, id(hems_eg1), id(eg1_budget_prio).state,
              id(eg1_budget_min).state, id(eg1_budget_max).state, 0.0f },
            { "EV", 1, nullptr, id(ev_budget_prio).state,
              std::min(id(ev_budget_min).state, ev_cap), ev_cap, 0.0f },
            { "WB", 0, id(hems_eg2), id(eg2_budget_prio).state,
              id(eg2_budget_min).state, id(eg2_budget_max).state, 0.0f },
          };
          // verbunden zaehlt fuer EG nur mit gueltiger Remote-SKI; EV ist lokal
          auto dev_ok = [](Dev& d) {
            if (d.kind == 1) return true;
            return d.eg->is_connected() && !d.eg->remote_ski().empty();
          };
          // Prioritaet sortieren (3 Elemente, insertion sort)
          for (int i = 1; i < 3; i++)
            for (int j = i; j > 0 && devs[j].prio < devs[j-1].prio; j--)
              std::swap(devs[j], devs[j-1]);

          float rest = budget;
          // Runde 1: Sockel in Prioritaetsreihenfolge
          for (auto &d : devs) {
            if (!dev_ok(d)) continue;
            d.share = std::min(d.pmin, rest);
            rest -= d.share;
          }
          // Runde 2: Rest bis zum Deckel
          for (auto &d : devs) {
            if (!dev_ok(d)) continue;
            float take = std::min(d.pmax - d.share, rest);
            if (take > 0.0f) { d.share += take; rest -= take; }
          }

          // Anwenden mit 100-W-Hysterese.
          // EG: share==0 wird als 1 W aktives Limit gesendet (set_limit(0) = loeschen).
          // EV: share -> Addon-Ampere fuers CSMB (Formel wie EV-Leistungsbegrenzung).
          std::string status;
          for (auto &d : devs) {
            char buf[48];
            if (!dev_ok(d)) {
              snprintf(buf, sizeof(buf), "%s: nicht verbunden", d.tag);
              status += status.empty() ? buf : std::string(" | ") + buf;
              continue;
            }
            float* last = (d.kind == 1) ? &id(budget_last_ev)
                        : (d.eg == id(hems_eg1)) ? &id(budget_last_eg1)
                                                 : &id(budget_last_eg2);
            if (d.kind == 1) {
              if (fabsf(d.share - *last) > 100.0f || *last < 0.0f) {
                float amps = d.share / 693.0f;   // 3 Phasen x 231 V
                float addon;
                if (d.share >= 11400.0f)   addon = 1.0f;
                else if (amps < 6.0f)      addon = 47.4f;  // Wallbox pausiert
                else                       addon = 50.0f - amps - 2.6f;
                id(ct1addon).make_call().set_value(addon).perform();
                id(ct2addon).make_call().set_value(addon).perform();
                id(ct3addon).make_call().set_value(addon).perform();
                *last = d.share;
              }
            } else {
              float send_w = d.share > 0.0f ? d.share : 1.0f;
              if (fabsf(send_w - *last) > 100.0f || *last < 0.0f) {
                d.eg->set_limit(send_w);
                *last = send_w;
              }
            }
            snprintf(buf, sizeof(buf), "%s: %.0f W", d.tag, d.share);
            status += status.empty() ? buf : std::string(" | ") + buf;
          }
          char head[64];
          snprintf(head, sizeof(head), "Limit %.0f + PV %.0f -> ", limit, 0.8f * pv);
          id(budget_distribution_status).publish_state(std::string(head) + status);
          ESP_LOGW("budget", "Verteilung: %s%s (Rest %.0f W)", head, status.c_str(), rest);

interval:
  # PV ändert sich — Anteile bei aktivem Limit regelmäßig nachführen
  - interval: 30s
    then:
      - if:
          condition:
            lambda: "return id(hems_cs).is_limit_active();"
          then:
            - script.execute: distribute_budget
