# EEBus Energy Guard 2 — second EG instance (port 4714, id: hems_eg2).
# Requires: hems_cs (from eebus-cs.yaml)
# Exports:  hems_eg2, eg2_device_type, sg_eebus_eg2

web_server:
  sorting_groups:
    - id: sg_eebus_eg2
      name: "EEBus Energy Guard 2 (EG2)"
      sorting_weight: 8

select:
  # --- EG2 device type (sg_eebus_eg2, weight 0) — persists to NVS across reboots ---
  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Gerätetyp"
    id: eg2_device_type
    icon: "mdi:devices"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 0
    entity_category: config
    options:
      - "Wärmepumpe"
      - "Wallbox"
    initial_option: "Wärmepumpe"
    restore_value: true
    optimistic: true
    on_value:
      # WP silently ignores limits below 4200 W; a wallbox accepts any value.
      - lambda: "id(hems_eg2).set_min_limit_w(x == \"Wärmepumpe\" ? 4200.0f : 0.0f);"

# CS-Limits erreichen EG2 über die Budget-Verteilung (budget-distributor.yaml),
# nicht mehr als Direktweiterleitung des vollen Limits.

eebus_eg:
  - id: hems_eg2
    remote_ski: !secret eebus_eg2_remote_ski
    ship_port: 4714
    instance_name: "EG2"
    device_brand: "DIY"
    device_type: "HEMS"
    device_model: "esphome-hems"
    supported_use_cases_text_sensor: eg2_supported_use_cases

    on_eg_connected:
      - lambda: |-
          ESP_LOGI("eebus", "EEBus EG2 (%s) connected — native power limiting active",
                   id(eg2_device_type).current_option().c_str());
          if (id(hems_cs).is_limit_active()) {
            float lim = id(hems_cs).current_limit_w();
            ESP_LOGW("eebus", "EG2 reconnect: re-applying active LPC limit %.0f W", lim);
            id(hems_eg2).set_limit(lim);
          }

    on_eg_disconnected:
      - lambda: |-
          ESP_LOGI("eebus", "EEBus EG2 (%s) disconnected — relay fallback available",
                   id(eg2_device_type).current_option().c_str());

    on_power_reading:
      - lambda: |-
          ESP_LOGI("eebus", "EG2 (%s) power reading: %.0f W",
                   id(eg2_device_type).current_option().c_str(), x);

sensor:
  # --- EG2 (sg_eebus_eg2, weights 1-2) ---
  - platform: template
    name: "${device_name} EG2 §14a Leistungslimit"
    id: eebus_eg2_active_limit
    icon: "mdi:transmission-tower"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 1
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return id(hems_eg2).active_limit_w();"

  - platform: template
    name: "${device_name} EG2 MPC Leistung"
    id: eebus_eg2_power
    icon: "mdi:gauge"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 2
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return id(hems_eg2).current_power_w();"

binary_sensor:
  # --- EG2 Heartbeat (sg_eebus_eg2, weight 2.5) ---
  - platform: template
    name: "${device_name} EG2 Heartbeat"
    id: eg2_heartbeat_ok
    icon: "mdi:heart-pulse"
    device_class: connectivity
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 2.5
    lambda: "return id(hems_eg2).is_connected() && !id(hems_eg2).is_heartbeat_alarm();"

interval:
  - interval: 5s
    then:
      - binary_sensor.template.publish:
          id: eg2_heartbeat_ok
          state: !lambda "return id(hems_eg2).is_connected() && !id(hems_eg2).is_heartbeat_alarm();"

text_sensor:
  # --- EG2 (sg_eebus_eg2, weights 3-8) ---
  - platform: template
    name: "${device_name} EG2 Verbindungsstatus"
    icon: "mdi:lan-connect"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 3
    update_interval: 5s
    lambda: |-
      std::string s = id(hems_eg2).pairing_state();
      auto pos = s.rfind(": ");
      if (pos != std::string::npos && s.size() - pos >= 42) {
        s = s.substr(0, pos);
      }
      return s;

  - platform: template
    name: "${device_name} EG2 Gerät"
    icon: "mdi:heat-pump-outline"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 4
    update_interval: 10s
    lambda: |-
      std::string label = id(hems_eg2).device_label();
      return label.empty() ? std::string("(unbekannt)") : label;

  - platform: template
    name: "${device_name} EG2 Remote-SKI"
    icon: "mdi:key-chain"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 5
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      std::string ski = id(hems_eg2).remote_ski();
      if (!ski.empty()) return ski;
      return id(hems_eg2).is_pairing_mode() ? std::string("(suche...)") : std::string("(keine)");

  - platform: template
    name: "${device_name} EG2 Eigene SKI (Port 4714)"
    icon: "mdi:key"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 6
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(hems_eg2).local_ski();"

  - platform: template
    name: "${device_name} EG2 Aktive UC"
    icon: "mdi:format-list-checks"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 7
    entity_category: diagnostic
    update_interval: 5s
    lambda: "return id(hems_eg2).active_use_cases();"

  - platform: template
    name: "${device_name} EG2 Unterstützte UC"
    id: eg2_supported_use_cases
    icon: "mdi:format-list-bulleted"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 8
    entity_category: diagnostic
    update_interval: never

number:
  # --- EG2 failsafe configuration (sg_eebus_eg2, weights 30-31) ---
  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Failsafe Limit"
    id: eebus_eg2_failsafe_limit
    icon: "mdi:shield-home"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 30
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 4200
    restore_value: true
    optimistic: true
    on_value:
      - lambda: "id(hems_eg2).update_failsafe_limit_w(x);"

  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Failsafe Dauer"
    id: eebus_eg2_failsafe_duration
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 31
    entity_category: config
    unit_of_measurement: "s"
    min_value: 7200
    max_value: 86400
    step: 600
    initial_value: 7200
    restore_value: true
    optimistic: true
    on_value:
      - lambda: "id(hems_eg2).update_failsafe_duration_s((uint32_t)x);"

  # --- EG2 Budget-Verteilung (sg_eebus_eg2, weights 32-34) ---
  # Betreiber-Parameter für den §14a-Verteiler (budget-distributor.yaml)
  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Budget Priorität"
    id: eg2_budget_prio
    icon: "mdi:sort-numeric-ascending"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 32
    entity_category: config
    min_value: 1
    max_value: 9
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true

  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Budget Sockel"
    id: eg2_budget_min
    icon: "mdi:arrow-collapse-down"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 33
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 0
    restore_value: true
    optimistic: true

  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Budget Max"
    id: eg2_budget_max
    icon: "mdi:arrow-collapse-up"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 34
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 11000
    restore_value: true
    optimistic: true

button:
  # --- EG2 Pairing (sg_eebus_eg2, weights 10-11) ---
  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Pairing-Modus starten"
    icon: "mdi:account-plus"
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 10
    on_press:
      - lambda: "id(hems_eg2).enter_pairing_mode();"

  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Pairing zurücksetzen"
    icon: "mdi:lock-reset"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 11
    on_press:
      - lambda: "id(hems_eg2).forget_pairing();"

  # --- EG2 diagnostics (sg_eebus_eg2, weight 20) ---
  - platform: template
    disabled_by_default: true
    name: "${device_name} EG2 Failsafe testen"
    icon: "mdi:shield-check"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_eg2
      sorting_weight: 20
    on_press:
      - lambda: "id(hems_eg2).start_heartbeat_test();"
