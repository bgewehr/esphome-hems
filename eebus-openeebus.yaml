# Native OpenEEBUS SHIP/SPINE integration.
# Provides the CLS-Steuerbox LPC receiver and EEBus heat-pump (EG/LPC) control.

eebus_lpc:
  id: hems_lpc
  ship_port: ${eebus_lpc_ship_port}
  remote_ski: !secret eebus_cls_remote_ski
  device_brand: "DIY"
  device_type: "HEMS"
  device_model: "esphome-hems"
  failsafe_limit_w: ${eebus_failsafe_limit_w}

  on_limit_active:
    - then:
        - lambda: |-
            id(power_limit_events).publish_state(id(power_limit_events).state + 1);
            ESP_LOGW("eebus", "EEBUS LPC limit active: %.0f W", x);
        - text_sensor.template.publish:
            id: last_enwg_event
            state: !lambda 'return std::string("Aktiviert (EEBus): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
        - number.set:
            id: ct1addon
            value: 45.0
        - number.set:
            id: ct2addon
            value: 45.0
        - number.set:
            id: ct3addon
            value: 45.0
        - light.turn_on:
            id: status_led
            effect: "Paragraph14a Warning Flash"
        - switch.turn_on: relay_1
        - lambda: |-
            id(hems_wp).set_limit(x);

  on_limit_cleared:
    - then:
        - logger.log: "EEBUS LPC limit cleared"
        - text_sensor.template.publish:
            id: last_enwg_event
            state: !lambda 'return std::string("Beendet (EEBus): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
        - number.set:
            id: ct1addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - number.set:
            id: ct2addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - number.set:
            id: ct3addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - lambda: |-
            id(hems_wp).clear_limit();
        - light.turn_off:
            id: status_led
        - switch.turn_off: relay_1

  on_pairing_request:
    - then:
        - lambda: |-
            ESP_LOGW("eebus", "Pairing request from SKI: %s", x.c_str());

eebus_wp:
  id: hems_wp
  ship_port: ${eebus_wp_ship_port}
  remote_ski: !secret eebus_wp_remote_ski
  device_brand: "DIY"
  device_type: "HEMS"
  device_model: "esphome-hems"
  failsafe_limit_w: ${eebus_failsafe_limit_w}
  failsafe_duration_s: ${eebus_failsafe_duration_s}

  on_wp_connected:
    - logger.log: "EEBus WP connected - native power limit control active"

  on_wp_disconnected:
    - logger.log: "EEBus WP disconnected - relay fallback remains available"

  on_power_reading:
    - lambda: |-
        ESP_LOGI("eebus", "WP power reading: %.0f W", x);

sensor:
  # --- CS (sg_eebus_cs, weights 1-2) ---
  - platform: template
    name: "${device_name} CS §14a Leistungslimit"
    id: eebus_vnb_power_limit
    icon: "mdi:transmission-tower"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 1
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return id(hems_lpc).current_limit_w();"

  - platform: template
    name: "${device_name} CS Verfuegbare Restleistung"
    id: eebus_available_power
    icon: "mdi:gauge"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 2
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(hems_lpc).is_limit_active()) return NAN;
      return id(hems_lpc).current_limit_w() - id(hems_wp).current_power_w();

  # --- WP (sg_eebus_wp, weights 1-2) ---
  - platform: template
    name: "${device_name} WP §14a Leistungslimit"
    id: eebus_wp_active_limit
    icon: "mdi:speedometer"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 1
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return id(hems_wp).active_limit_w();"

  - platform: template
    name: "${device_name} WP MPC Power"
    id: eebus_wp_power
    icon: "mdi:heat-pump"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 2
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return id(hems_wp).current_power_w();"

text_sensor:
  # --- CS (sg_eebus_cs, weights 3-6) ---
  - platform: template
    name: "${device_name} CS Verbindungsstatus"
    icon: "mdi:lan-connect"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 3
    update_interval: 5s
    lambda: |-
      std::string s = id(hems_lpc).pairing_state();
      // SKI is already shown in "CS Pairing ausstehend" / "CS Gepaarte SKI" —
      // strip the trailing ": <ski>" (40 hex chars) from Verbindungsstatus
      auto pos = s.rfind(": ");
      if (pos != std::string::npos && s.size() - pos >= 42) {
        s = s.substr(0, pos);
      }
      return s;

  - platform: template
    name: "${device_name} CS Pairing ausstehend"
    icon: "mdi:key-alert"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 4
    update_interval: 3s
    lambda: |-
      std::string ski = id(hems_lpc).pending_remote_ski();
      if (ski.empty() || ski == id(hems_lpc).paired_remote_ski()) return std::string("(keine)");
      return ski;

  - platform: template
    name: "${device_name} CS Gepaarte SKI"
    icon: "mdi:key-chain"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 5
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      std::string ski = id(hems_lpc).paired_remote_ski();
      return ski.empty() ? std::string("(keine)") : ski;

  - platform: template
    name: "${device_name} CS Eigene SKI (Port 4712)"
    icon: "mdi:key"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 6
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(hems_lpc).local_ski();"

  # --- WP (sg_eebus_wp, weights 3-5) ---
  - platform: template
    name: "${device_name} WP Verbindungsstatus"
    icon: "mdi:heat-pump"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 3
    update_interval: 5s
    lambda: "return id(hems_wp).pairing_state();"

  - platform: template
    name: "${device_name} WP Gerät"
    icon: "mdi:heat-pump-outline"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 4
    update_interval: 10s
    lambda: |-
      std::string label = id(hems_wp).device_label();
      return label.empty() ? std::string("(unbekannt)") : label;

  - platform: template
    name: "${device_name} WP Remote-SKI"
    icon: "mdi:key-chain"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 5
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      std::string ski = id(hems_wp).remote_ski();
      return ski.empty() ? std::string("(suche...)") : ski;

  - platform: template
    name: "${device_name} WP Eigene SKI (Port 4713)"
    icon: "mdi:key-variant"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 6
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(hems_wp).local_ski();"

  # --- §14a Steuerungskanal (sg_netz) ---
  - platform: template
    name: "${device_name} §14a Steuerungskanal"
    icon: "mdi:transmission-tower"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 4
    update_interval: 5s
    lambda: |-
      if (id(hems_lpc).is_limit_active()) return std::string("EEBus digital (CS)");
      if (id(grid_provider_switch).state) return std::string("Relaiskontakt DI1");
      if (id(manual_enwg_test).state) return std::string("Simulation 4200 W");
      return std::string("Kein Eingriff aktiv");

  # --- CS Use Cases (sg_eebus_cs) ---
  - platform: template
    name: "${device_name} CS Use Cases"
    icon: "mdi:format-list-checks"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 7
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (id(hems_lpc).is_paired()) return std::string("CS/LPC");
      return std::string("(keine)");

  # --- WP Use Cases (sg_eebus_wp) ---
  - platform: template
    name: "${device_name} WP Use Cases"
    icon: "mdi:format-list-checks"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 7
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(hems_wp).active_use_cases();"

button:
  # --- CS Pairing (sg_eebus_cs, weights 10-13) ---
  - platform: template
    name: "${device_name} CS Pairing-Modus starten"
    icon: "mdi:account-plus"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 10
    on_press:
      - lambda: "id(hems_lpc).enter_pairing_mode();"

  - platform: template
    name: "${device_name} CS Pairing akzeptieren"
    icon: "mdi:check-circle"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 11
    on_press:
      - lambda: "id(hems_lpc).accept_pairing();"

  - platform: template
    name: "${device_name} CS Pairing ablehnen"
    icon: "mdi:close-circle"
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 12
    on_press:
      - lambda: "id(hems_lpc).reject_pairing();"

  - platform: template
    name: "${device_name} CS Pairing zurücksetzen"
    icon: "mdi:lock-reset"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_cs
      sorting_weight: 13
    on_press:
      - lambda: "id(hems_lpc).forget_pairing(id(hems_lpc).paired_remote_ski());"

  # --- WP Pairing (sg_eebus_wp, weights 10-11) ---
  - platform: template
    name: "${device_name} WP Pairing-Modus starten"
    icon: "mdi:account-plus"
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 10
    on_press:
      - lambda: "id(hems_wp).enter_pairing_mode();"

  - platform: template
    name: "${device_name} WP Pairing zurücksetzen"
    icon: "mdi:lock-reset"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 11
    on_press:
      - lambda: "id(hems_wp).forget_pairing();"

  # --- WP Diagnose (sg_eebus_wp, weights 20-23) ---
  - platform: template
    name: "${device_name} WP Failsafe testen"
    icon: "mdi:shield-check"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 20
    on_press:
      - lambda: "id(hems_wp).set_limit(4200.0f);"

  - platform: template
    name: "${device_name} WP Normalbetrieb"
    icon: "mdi:restore"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 21
    on_press:
      - lambda: "id(hems_wp).clear_limit();"

  - platform: template
    name: "${device_name} WP Limit 4200 W"
    icon: "mdi:lightning-bolt-circle"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 22
    on_press:
      - lambda: "id(hems_wp).set_limit(4200.0f);"

  - platform: template
    name: "${device_name} WP Vollleistung freigeben"
    icon: "mdi:check-circle"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 23
    on_press:
      - lambda: "id(hems_wp).clear_limit();"

  - platform: template
    name: "${device_name} WP mDNS register=true"
    icon: "mdi:broadcast"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 24
    on_press:
      - lambda: "id(hems_wp).set_mdns_register(true);"

  - platform: template
    name: "${device_name} WP mDNS register=false"
    icon: "mdi:broadcast-off"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_eebus_wp
      sorting_weight: 25
    on_press:
      - lambda: "id(hems_wp).set_mdns_register(false);"
