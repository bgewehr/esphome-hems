name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall -q components tools

  esphome:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ESPHome
        run: python -m pip install esphome==2026.5.3

      - name: Create CI secrets
        run: |
          cat > secrets.yaml <<'EOF'
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci"
          fronius_ip: "127.0.0.1"
          mqtt_broker: "127.0.0.1"
          eebus_cs_remote_ski: ""
          eebus_eg1_remote_ski: ""
          eebus_eg2_remote_ski: ""
          hems_ip: "127.0.0.1"
          EOF

      - name: Compile ESPHome firmware
        run: esphome compile esphome-hems.yaml

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure host tests
        run: cmake -S tests -B build/host-tests -DCMAKE_BUILD_TYPE=Release

      - name: Build host tests
        run: cmake --build build/host-tests --config Release --parallel

      - name: Run host tests
        run: ctest --test-dir build/host-tests --build-config Release --output-on-failure