# §14a Budget-Verteilung — teilt das CS-Limit auf die steuerbaren Geräte auf.
# Konzept: docs/power-distribution-concept.md (strikte Priorität mit Sockeln).
#
# Budget = P_Limit(VNB) + 0.8 × PV-Leistung   (Saldierung, 20 % Sicherheitsmarge;
#          Batterie-Entladung wird in V1 noch nicht angerechnet)
# Runde 1: jedem verbundenen Gerät in Prioritätsreihenfolge seinen Sockel (Min).
# Runde 2: Restbudget in Prioritätsreihenfolge bis zum Deckel (Max).
#
# Verteilt wird an die EEBus-Geräte EG1 (WP) und EG2 (Wallbox). Der EV-Lade-
# pfad (ct*addon + relay_1 in esphome-hems.yaml) bleibt unverändert — er hat
# eine eigene feste Begrenzung und wird erst in V2 in die Verteilung integriert.
#
# Requires: hems_cs (eebus-cs.yaml), hems_eg1 (eebus-eg-1.yaml),
#           hems_eg2 (eebus-eg-2.yaml), fronius_solar_power (fronius-gen24.yaml)

web_server:
  sorting_groups:
    - id: sg_budget
      name: "§14a Budget-Verteilung"
      sorting_weight: 4

globals:
  # zuletzt gesendete Anteile — Hysterese (>100 W) und Neusenden nach Aktivierung
  - id: budget_last_eg1
    type: float
    initial_value: '-1.0f'
  - id: budget_last_eg2
    type: float
    initial_value: '-1.0f'

number:
  # --- Betreiber-Parameter je Gerät (NVS-persistent) ---
  - platform: template
    name: "${device_name} EG1 Budget Priorität"
    id: eg1_budget_prio
    icon: "mdi:sort-numeric-ascending"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 10 }
    entity_category: config
    min_value: 1
    max_value: 9
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EG1 Budget Min"
    id: eg1_budget_min
    icon: "mdi:arrow-collapse-down"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 11 }
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 4200   # WP ignoriert kleinere aktive Limits ohnehin
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EG1 Budget Max"
    id: eg1_budget_max
    icon: "mdi:arrow-collapse-up"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 12 }
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 9000
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EG2 Budget Priorität"
    id: eg2_budget_prio
    icon: "mdi:sort-numeric-ascending"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 20 }
    entity_category: config
    min_value: 1
    max_value: 9
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EG2 Budget Min"
    id: eg2_budget_min
    icon: "mdi:arrow-collapse-down"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 21 }
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 0
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EG2 Budget Max"
    id: eg2_budget_max
    icon: "mdi:arrow-collapse-up"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 22 }
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 20000
    step: 100
    initial_value: 11000
    restore_value: true
    optimistic: true

text_sensor:
  - platform: template
    name: "${device_name} Budget-Verteilung"
    id: budget_distribution_status
    icon: "mdi:chart-pie"
    web_server: { sorting_group_id: sg_budget, sorting_weight: 1 }
    update_interval: never

script:
  - id: distribute_budget
    mode: single
    then:
      - lambda: |-
          if (!id(hems_cs).is_limit_active()) return;

          const float limit = id(hems_cs).current_limit_w();
          float pv = id(fronius_solar_power).state;
          if (std::isnan(pv) || pv < 0.0f) pv = 0.0f;
          float budget = limit + 0.8f * pv;

          struct Dev {
            esphome::eebus_eg::EebusEgComponent* eg;
            const char* tag;
            float prio, pmin, pmax, share;
          };
          Dev devs[2] = {
            { id(hems_eg1), "WP", id(eg1_budget_prio).state,
              id(eg1_budget_min).state, id(eg1_budget_max).state, 0.0f },
            { id(hems_eg2), "WB", id(eg2_budget_prio).state,
              id(eg2_budget_min).state, id(eg2_budget_max).state, 0.0f },
          };
          if (devs[1].prio < devs[0].prio) std::swap(devs[0], devs[1]);

          float rest = budget;
          // Runde 1: Sockel in Prioritätsreihenfolge
          for (auto &d : devs) {
            if (!d.eg->is_connected()) continue;
            d.share = std::min(d.pmin, rest);
            rest -= d.share;
          }
          // Runde 2: Rest bis zum Deckel
          for (auto &d : devs) {
            if (!d.eg->is_connected()) continue;
            float take = std::min(d.pmax - d.share, rest);
            if (take > 0.0f) { d.share += take; rest -= take; }
          }

          // Anwenden mit 100-W-Hysterese. share==0 wird als 1 W gesendet:
          // set_limit(0) würde das Limit LÖSCHEN (Gerät unbegrenzt) statt
          // eine aktive 0-W-Zuteilung zu setzen.
          std::string status;
          for (auto &d : devs) {
            char buf[48];
            if (!d.eg->is_connected()) {
              snprintf(buf, sizeof(buf), "%s: nicht verbunden", d.tag);
              status += status.empty() ? buf : std::string(" | ") + buf;
              continue;
            }
            float send_w = d.share > 0.0f ? d.share : 1.0f;
            float* last = (d.eg == id(hems_eg1)) ? &id(budget_last_eg1)
                                                 : &id(budget_last_eg2);
            if (fabsf(send_w - *last) > 100.0f || *last < 0.0f) {
              d.eg->set_limit(send_w);
              *last = send_w;
            }
            snprintf(buf, sizeof(buf), "%s: %.0f W", d.tag, d.share);
            status += status.empty() ? buf : std::string(" | ") + buf;
          }
          char head[64];
          snprintf(head, sizeof(head), "Limit %.0f + PV %.0f -> ", limit, 0.8f * pv);
          id(budget_distribution_status).publish_state(std::string(head) + status);
          ESP_LOGW("budget", "Verteilung: %s%s (Rest %.0f W)", head, status.c_str(), rest);

# Plugin: Verteilung statt Direktweiterleitung (Trigger-Merge über Packages)
eebus_cs:
  on_limit_active:
    - script.execute: distribute_budget
  on_limit_cleared:
    - lambda: |-
        id(budget_last_eg1) = -1.0f;
        id(budget_last_eg2) = -1.0f;
        id(hems_eg1).clear_limit();
        id(hems_eg2).clear_limit();
        id(budget_distribution_status).publish_state("kein Limit aktiv");

interval:
  # PV ändert sich — Anteile bei aktivem Limit regelmäßig nachführen
  - interval: 30s
    then:
      - if:
          condition:
            lambda: "return id(hems_cs).is_limit_active();"
          then:
            - script.execute: distribute_budget
