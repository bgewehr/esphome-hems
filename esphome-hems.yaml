substitutions:
  name: "esphome-hems"
  friendly_name: "ESPHome HEMS"
  device_name: "ESPHome HEMS"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "EnWG §14a HEMS with EEBus, Modbus TCP/RTU, MQTT, and S0 meter support"
  name_add_mac_suffix: false
  build_path: "c:/temp/esphome-hems"
  project:
    name: "ESPHome.HEMS"
    version: "2"
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: build_time_sensor
          state: !lambda 'return std::string(__DATE__) + "  " + std::string(__TIME__);'
      # Boot-Log-Level als Session-Obergrenze einfrieren; Session-Select ggf.
      # darauf zurueckholen. Erhoehen geht nur per Reboot (Ziel: keine
      # vergessene Debug-Last auf einem stabilen Geraet).
      - lambda: |-
          auto to_num = [](const std::string& o) {
            if (o == "ERROR") return 1;
            if (o == "WARN")  return 2;
            if (o == "INFO")  return 3;
            return 4;  // DEBUG
          };
          int ceiling = to_num(id(boot_log_level_select).current_option());
          id(boot_log_level_max) = ceiling;
          if (to_num(id(log_level_select).current_option()) > ceiling) {
            const char* names[5] = {"", "ERROR", "WARN", "INFO", "DEBUG"};
            id(log_level_select).make_call().set_option(names[ceiling]).perform();
          }

esp32:
  board: esp32s3box
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf   # Required for native OpenEEBUS SHIP/SPINE components
    sdkconfig_options:
      # loopTask stack: EEBus TLS setup allocates ~10 KB per instance
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "65536"
      # Copy code/rodata to PSRAM: prevents cache-disable crash during NVS writes (restore_value)
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # EEBus uses self-signed certs with SKI-based trust — optional client cert verification
      CONFIG_ESP_TLS_SERVER_MIN_AUTH_MODE_OPTIONAL: "y"
      # Retain peer cert after TLS handshake so mbedtls_ssl_get_peer_cert() returns the SKI
      CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE: "y"
      # CONFIG_LWIP_MAX_SOCKETS is set automatically by eebus_cs and eebus_eg via consume_sockets()
      # Keep allocations >2 KB in PSRAM; internal SRAM stays free for DMA (W5500 SPI, FreeRTOS)
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "2048"

# 8 MB Octal PSRAM (ESP32-S3-WROOM-1U-N16R8); explicit config prevents W5500 DMA buffer misplacement.
psram:
  mode: octal
  speed: 80MHz

globals:
  # Beim Boot aus boot_log_level_select eingefroren — Obergrenze der Session
  - id: boot_log_level_max
    type: int
    initial_value: '4'

logger:
  id: app_logger
  level: DEBUG  # Must compile at DEBUG; runtime level and tag filters set via Log Level/Log Filter selects
  runtime_tag_levels: true

select:
  - platform: template
    disabled_by_default: true
    name: "${device_name} Log Level"
    id: log_level_select
    icon: "mdi:tune"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 2
    options:
      - "ERROR"
      - "WARN"
      - "INFO"
      - "DEBUG"
    initial_option: "WARN"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            // Boot-Log-Level ist die Obergrenze dieser Session — hoehere Auswahl
            // schnappt zurueck; mehr gibt es nur per Reboot mit hoeherem Boot-Level.
            auto to_num = [](const std::string& o) {
              if (o == "ERROR") return 1;
              if (o == "WARN")  return 2;
              if (o == "INFO")  return 3;
              return 4;  // DEBUG
            };
            int ceiling = id(boot_log_level_max);
            if (to_num(x) > ceiling) {
              const char* names[5] = {"", "ERROR", "WARN", "INFO", "DEBUG"};
              ESP_LOGW("system", "Log Level %s > Boot-Obergrenze %s — begrenzt (Reboot mit hoeherem Boot Log Level noetig)",
                       x.c_str(), names[ceiling]);
              id(log_level_select).make_call().set_option(names[ceiling]).perform();
              return;
            }
            int level = ESPHOME_LOG_LEVEL_WARN;
            if (x == "ERROR") level = ESPHOME_LOG_LEVEL_ERROR;
            else if (x == "WARN") level = ESPHOME_LOG_LEVEL_WARN;
            else if (x == "INFO") level = ESPHOME_LOG_LEVEL_INFO;
            else if (x == "DEBUG") level = ESPHOME_LOG_LEVEL_DEBUG;
            id(app_logger).set_log_level(level);

  - platform: template
    disabled_by_default: true
    name: "${device_name} Boot Log Level"
    id: boot_log_level_select
    icon: "mdi:restart-alert"
    entity_category: config
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 2.5
    options:
      - "ERROR"
      - "WARN"
      - "INFO"
      - "DEBUG"
    initial_option: "WARN"
    optimistic: true
    restore_value: true
    # Bewusst KEIN on_value: der Wert wird nur beim Boot eingefroren.
    # Aendern -> Restart-Button -> neue Session-Obergrenze.

  - platform: template
    disabled_by_default: true
    name: "${device_name} Log Filter"
    id: log_filter_select
    icon: "mdi:filter"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 3
    options:
      - "Alle"
      - "EEBus"
      - "Modbus TCP"
      - "Modbus RTU"
      - "MQTT"
      - "Netzwerk"
    initial_option: "Alle"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            auto current = id(log_level_select).current_option();
            int gl = ESPHOME_LOG_LEVEL_WARN;
            if (current == "ERROR") gl = ESPHOME_LOG_LEVEL_ERROR;
            else if (current == "WARN") gl = ESPHOME_LOG_LEVEL_WARN;
            else if (current == "INFO") gl = ESPHOME_LOG_LEVEL_INFO;
            else if (current == "DEBUG") gl = ESPHOME_LOG_LEVEL_DEBUG;

            // Reset all known tags first so no previous filter state bleeds through.
            auto suppress = [&](const char* tag) { id(app_logger).set_log_level(tag, ESPHOME_LOG_LEVEL_ERROR); };
            suppress("eebus"); suppress("eebus_cs"); suppress("eebus_eg");
            suppress("eebus_http_srv"); suppress("eebus_ws_srv"); suppress("eebus_ws_cli");
            suppress("eebus_mdns");
            suppress("ship"); suppress("spine"); suppress("openeebus"); suppress("mdns");
            suppress("esp-tls-mbedtls"); suppress("esp_https_server"); suppress("httpd");
            suppress("modbustcp_controller.sensor"); suppress("modbustcp");
            suppress("http_request.idf");
            suppress("sensor"); suppress("template.sensor");
            suppress("modbus_server"); suppress("modbus-server-xemex");
            suppress("enwg");
            suppress("mqtt");
            suppress("ethernet"); suppress("api"); suppress("api.connection"); suppress("web_server");

            if (x == "Alle") {
              id(app_logger).set_log_level(gl);
              auto enable = [&](const char* tag) { id(app_logger).set_log_level(tag, gl); };
              enable("eebus"); enable("eebus_cs"); enable("eebus_eg");
              enable("eebus_http_srv"); enable("eebus_ws_srv"); enable("eebus_ws_cli");
              enable("eebus_mdns");
              enable("ship"); enable("spine"); enable("openeebus"); enable("mdns");
              enable("esp-tls-mbedtls"); enable("esp_https_server"); enable("httpd");
              enable("modbustcp_controller.sensor"); enable("modbustcp");
              enable("http_request.idf");
              enable("sensor"); enable("template.sensor");
              enable("modbus_server"); enable("modbus-server-xemex"); enable("enwg"); enable("mqtt");
              enable("ethernet"); enable("api"); enable("api.connection"); enable("web_server");
            } else {
              id(app_logger).set_log_level(ESPHOME_LOG_LEVEL_ERROR);
              // EEBus filter shows INFO minimum so key connection events are always visible.
              int eebus_level = (gl > ESPHOME_LOG_LEVEL_INFO) ? gl : ESPHOME_LOG_LEVEL_INFO;
              auto enable = [&](const char* tag) { id(app_logger).set_log_level(tag, gl); };
              auto enable_eebus = [&](const char* tag) { id(app_logger).set_log_level(tag, eebus_level); };
              if (x == "EEBus") {
                enable_eebus("eebus"); enable_eebus("eebus_cs"); enable_eebus("eebus_eg");
                enable_eebus("eebus_http_srv"); enable_eebus("eebus_ws_srv"); enable_eebus("eebus_ws_cli");
                enable_eebus("eebus_mdns");
                enable_eebus("ship"); enable_eebus("spine"); enable_eebus("openeebus"); enable_eebus("mdns");
                enable_eebus("enwg");
                enable("esp-tls-mbedtls"); enable("esp_https_server"); enable("httpd");
              } else if (x == "Modbus TCP") {
                enable("modbustcp_controller.sensor"); enable("modbustcp");
                enable("http_request.idf");
                enable("sensor"); enable("template.sensor");
              } else if (x == "Modbus RTU") {
                enable("modbus_server"); enable("modbus-server-xemex");
              } else if (x == "MQTT") {
                enable("mqtt");
              } else if (x == "Netzwerk") {
                enable("ethernet"); enable("api"); enable("api.connection"); enable("web_server");
              }
            }
            // Always keep crash backtraces visible regardless of the active filter.
            id(app_logger).set_log_level("esp32.crash", ESPHOME_LOG_LEVEL_ERROR);

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# W5500 SPI Ethernet (PoE) — Waveshare ESP32-S3-POE-ETH-8DI-8RO
ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  # Optional static IP — comment out for DHCP:
  # manual_ip:
  #   static_ip: 192.168.1.100
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

web_server:
  port: 80
  local: true
  version: 3
  sorting_groups:
    - id: sg_system
      name: "System"
      sorting_weight: 9

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  discovery: true
  topic_prefix: esphome/modbus-server-xemex

time:
  # SNTP syncs quickly after network connect, before the first EEBus SHIP handshake completes.
  - platform: sntp
    id: sntp_time
    on_time_sync:
      then:
        - lambda: |-
            id(hems_eg1).refresh_heartbeat();
            id(hems_eg2).refresh_heartbeat();
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lambda: |-
            id(hems_eg1).refresh_heartbeat();
            id(hems_eg2).refresh_heartbeat();

external_components:
  # Local native implementations (ESP-IDF compatible, no Arduino dependency):
  #   modbus_server: replaces thomase1234/esphome-fake-xemex-csmb (Arduino-only)
  #   modbustcp:     local fork with unit-ID fix
  - source:
      type: local
      path: components
    components:
      - modbus_server
      - modbustcp
      - eebus_eg
      - eebus_cs
  - source: github://creepystefan/esphome_modbus_tcp
    refresh: 1d
    components:
      - modbustcp_controller

text_sensor:
  - platform: version
    name: "${device_name} ESPHome Version"
    icon: "mdi:information"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 1
    hide_timestamp: true

  - platform: template
    name: "${device_name} Build Time"
    id: build_time_sensor
    icon: "mdi:calendar-clock"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 4
    update_interval: never

button:
  - platform: restart
    disabled_by_default: true
    name: "${device_name} Restart"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 10

packages:
  dido: !include dido.yaml
  xemex_csmb: !include xemex-csmb.yaml
  fronius: !include fronius-gen24.yaml
  eebus_cs: !include eebus-cs.yaml
  eebus_eg1: !include eebus-eg-1.yaml
  eebus_eg2: !include eebus-eg-2.yaml
  netz_steuerung: !include netzdienliche-steuerung.yaml
  s0_meter_1: !include s0-meter-1.yaml
