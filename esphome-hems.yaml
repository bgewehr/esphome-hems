substitutions:
  name: "esphome-hems"
  friendly_name: "ESPHome HEMS"
  device_name: "ESPHome HEMS"
  # S0-Wasserzähler: Standardwert Liter pro Impuls (wird durch HA-Number überschrieben)
  water_liters_per_pulse_default: "1.0"
  # Fronius Gen24 Plus 8.0 – Modbus TCP
  fronius_ip: !secret fronius_ip
  fronius_port: "502"
  # BYD HVS/HVM max. Entladeleistung (W) – für Prozentberechnung
  battery_max_discharge_w: "18176"
  # Native EEBUS SHIP/SPINE ports
  eebus_lpc_ship_port: "4712"
  eebus_eg1_ship_port: "4713"
  eebus_failsafe_limit_w: "4200.0"
  eebus_failsafe_duration_s: "7200"
  # EG1: Gerätetyp wird zur Laufzeit per Select (eg1_device_type) in eebus-openeebus.yaml gewählt
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "ESPHome-HEMS – Xemex CSMB Modbus Server + §14a EnWG"
  name_add_mac_suffix: false
  build_path: "c:/temp/esphome-hems"
  project:
    name: "ESPHome.HEMS"
    version: "2"
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: build_time_sensor
          state: !lambda 'return std::string(__DATE__) + "  " + std::string(__TIME__);'

esp32:
  board: esp32s3box
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf   # Benoetigt fuer native OpenEEBUS SHIP/SPINE-Komponenten
    sdkconfig_options:
      # Stack Overflow Fix: loopTask braucht mehr Stack bei vielen Komponenten
      # (EEBUS TLS/Certificate-Setup allokiert ~10 KB auf dem Stack pro Instanz)
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "65536"
      # Cache-Crash Fix: Code/Rodata nach PSRAM kopieren, damit NVS-Writes
      # (restore_value) nicht crashen wenn Flash-Cache deaktiviert wird
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # EEBus SHIP: Client-Zertifikat anfordern aber nicht erzwingen (VERIFY_OPTIONAL)
      # Notwendig weil EEBus self-signed Zertifikate mit SKI-basiertem Trust verwendet
      CONFIG_ESP_TLS_SERVER_MIN_AUTH_MODE_OPTIONAL: "y"
      # EEBus SHIP: Peer-Zertifikat nach dem TLS-Handshake im RAM behalten.
      # mbedTLS 3.x (ESP-IDF 5.x) gibt das Peer-Cert nach dem Handshake frei,
      # sodass mbedtls_ssl_get_peer_cert() NULL zurückgibt — SKI würde 'unknown'.
      # Mit dieser Option bleibt das Zertifikat bis zum Verbindungsende erhalten.
      CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE: "y"
      # CONFIG_LWIP_MAX_SOCKETS wird von eebus_lpc (→16) und eebus_eg1 (→21)
      # automatisch gesetzt — kein manueller Eintrag hier nötig.
      # PSRAM-Heap-Fix: EEBus-TLS-Sitzungspuffer (je ~16 KB I/O + Handshake-Kontext)
      # erschöpfen bei längerem Betrieb den internen SRAM, der gleichzeitig vom
      # W5500-SPI-DMA-Treiber für DMA-Alignment-Kopien (4-8 Byte pro SPI-Register-
      # Transaktion) benötigt wird. Ohne freien internen SRAM schlägt heap_caps_-
      # aligned_alloc(MALLOC_CAP_DMA) im ESP-IDF spi_master.c fehl und führt zu
      # einem Crash in uninstall_priv_desc (NULL-memcpy).
      # Lösung: Allokationen > 2 KB in den 8-MB-PSRAM auslagern, so dass der
      # interne SRAM für DMA-kritische Operationen und kleine Puffer reserviert bleibt.
      # Allokationen <= 2 KB (SPI-DMA-Kopien, Ethernet-Frames bis 1518 B, FreeRTOS-
      # Strukturen) bleiben im schnellen internen SRAM.
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "2048"

# PSRAM konfigurieren – ESP32-S3-WROOM-1U-N16R8 hat 8 MB Octal PSRAM.
# Ohne diese Konfiguration können DMA-Puffer für den W5500-SPI-Ethernet-Chip
# fehlerhaft im PSRAM platziert werden, was den Ethernet-Link verhindert.
psram:
  mode: octal
  speed: 80MHz

logger:
  id: app_logger
  level: DEBUG  # Compile-Level muss höchstes sein, Runtime-Filter per Select
  runtime_tag_levels: true

select:
  - platform: template
    name: "${device_name} Log Level"
    id: log_level_select
    icon: "mdi:tune"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 2
    options:
      - "ERROR"
      - "WARN"
      - "INFO"
      - "DEBUG"
    initial_option: "WARN"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            int level = ESPHOME_LOG_LEVEL_WARN;
            if (x == "ERROR") level = ESPHOME_LOG_LEVEL_ERROR;
            else if (x == "WARN") level = ESPHOME_LOG_LEVEL_WARN;
            else if (x == "INFO") level = ESPHOME_LOG_LEVEL_INFO;
            else if (x == "DEBUG") level = ESPHOME_LOG_LEVEL_DEBUG;
            id(app_logger).set_log_level(level);

  - platform: template
    name: "${device_name} Log Filter"
    id: log_filter_select
    icon: "mdi:filter"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 3
    options:
      - "Alle"
      - "EEBus"
      - "Modbus TCP"
      - "Modbus RTU"
      - "MQTT"
      - "Netzwerk"
    initial_option: "Alle"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            // Globales Level ermitteln
            auto current = id(log_level_select).current_option();
            int gl = ESPHOME_LOG_LEVEL_WARN;
            if (current == "ERROR") gl = ESPHOME_LOG_LEVEL_ERROR;
            else if (current == "WARN") gl = ESPHOME_LOG_LEVEL_WARN;
            else if (current == "INFO") gl = ESPHOME_LOG_LEVEL_INFO;
            else if (current == "DEBUG") gl = ESPHOME_LOG_LEVEL_DEBUG;

            // Alle bekannten Tags zuerst auf ERROR zurücksetzen, damit kein
            // vorheriger Filter-Zustand durchschlägt (level_for() prüft Tag-Map
            // vor dem globalen Level — alte Einträge müssen explizit gelöscht werden).
            auto suppress = [&](const char* tag) { id(app_logger).set_log_level(tag, ESPHOME_LOG_LEVEL_ERROR); };
            suppress("eebus"); suppress("eebus_lpc"); suppress("eebus_eg1");
            suppress("eebus_http_srv"); suppress("eebus_ws_srv"); suppress("eebus_ws_cli");
            suppress("eebus_mdns");
            suppress("ship"); suppress("spine"); suppress("openeebus"); suppress("mdns");
            suppress("esp-tls-mbedtls"); suppress("esp_https_server"); suppress("httpd");
            suppress("modbustcp_controller.sensor"); suppress("modbustcp");
            suppress("http_request.idf");
            suppress("sensor"); suppress("template.sensor");
            suppress("modbus_server"); suppress("modbus-server-xemex");
            suppress("enwg");
            suppress("mqtt");
            suppress("ethernet"); suppress("api"); suppress("api.connection"); suppress("web_server");

            if (x == "Alle") {
              // Globales Level setzen; alle Tags explizit mitsetzen damit die
              // Map-Einträge nicht ältere Werte behalten.
              id(app_logger).set_log_level(gl);
              auto enable = [&](const char* tag) { id(app_logger).set_log_level(tag, gl); };
              enable("eebus"); enable("eebus_lpc"); enable("eebus_eg1");
              enable("eebus_http_srv"); enable("eebus_ws_srv"); enable("eebus_ws_cli");
              enable("eebus_mdns");
              enable("ship"); enable("spine"); enable("openeebus"); enable("mdns");
              enable("esp-tls-mbedtls"); enable("esp_https_server"); enable("httpd");
              enable("modbustcp_controller.sensor"); enable("modbustcp");
              enable("http_request.idf");
              enable("sensor"); enable("template.sensor");
              enable("modbus_server"); enable("modbus-server-xemex"); enable("enwg"); enable("mqtt");
              enable("ethernet"); enable("api"); enable("api.connection"); enable("web_server");
            } else {
              // Global auf ERROR, nur gewählte Tags auf Wunschlevel setzen.
              id(app_logger).set_log_level(ESPHOME_LOG_LEVEL_ERROR);
              // EEBus filter always shows INFO minimum so key connection events are visible.
              int eebus_level = (gl > ESPHOME_LOG_LEVEL_INFO) ? gl : ESPHOME_LOG_LEVEL_INFO;
              auto enable = [&](const char* tag) { id(app_logger).set_log_level(tag, gl); };
              auto enable_eebus = [&](const char* tag) { id(app_logger).set_log_level(tag, eebus_level); };
              if (x == "EEBus") {
                enable_eebus("eebus"); enable_eebus("eebus_lpc"); enable_eebus("eebus_eg1");
                enable_eebus("eebus_http_srv"); enable_eebus("eebus_ws_srv"); enable_eebus("eebus_ws_cli");
                enable_eebus("eebus_mdns");
                enable_eebus("ship"); enable_eebus("spine"); enable_eebus("openeebus"); enable_eebus("mdns");
                enable_eebus("enwg");
                enable("esp-tls-mbedtls"); enable("esp_https_server"); enable("httpd");
              } else if (x == "Modbus TCP") {
                enable("modbustcp_controller.sensor"); enable("modbustcp");
                enable("http_request.idf");
                enable("sensor"); enable("template.sensor");
              } else if (x == "Modbus RTU") {
                enable("modbus_server"); enable("modbus-server-xemex");
              } else if (x == "MQTT") {
                enable("mqtt");
              } else if (x == "Netzwerk") {
                enable("ethernet"); enable("api"); enable("api.connection"); enable("web_server");
              }
            }
            // Crash-Backtraces immer sichtbar halten, unabhängig vom gewählten Filter.
            id(app_logger).set_log_level("esp32.crash", ESPHOME_LOG_LEVEL_ERROR);

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# W5500 SPI Ethernet (PoE) – Waveshare ESP32-S3-POE-ETH-8DI-8RO Pins
ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  # Optionale statische IP – auskommentieren für DHCP:
  # manual_ip:
  #   static_ip: 192.168.1.100
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

web_server:
  port: 80
  local: true
  version: 3
  sorting_groups:
    - id: sg_fronius
      name: "Fronius"
      sorting_weight: 1
    - id: sg_wallbox
      name: "Xemex CSMB"
      sorting_weight: 2
    - id: sg_netz
      name: "Netzdienliche Steuerung"
      sorting_weight: 3
    - id: sg_wasser
      name: "Wasser"
      sorting_weight: 4
    - id: sg_dido
      name: "DI/DO"
      sorting_weight: 5
    - id: sg_eebus_cs
      name: "EEBus CS (Steuerbox)"
      sorting_weight: 6
    - id: sg_eebus_eg1
      name: "EEBus Energy Guard 1 (EG1)"
      sorting_weight: 7
    - id: sg_system
      name: "System"
      sorting_weight: 8

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  discovery: true
  topic_prefix: esphome/modbus-server-xemex

time:
  # SNTP syncs within ~1 s of WiFi connect — before K40RF completes its
  # SHIP handshake (~5–10 s).  This ensures the first heartbeat timestamp
  # K40RF receives is a valid 2026 date, not the 1970 epoch.
  - platform: sntp
    id: sntp_time
    on_time_sync:
      then:
        - lambda: id(hems_eg1).refresh_heartbeat();
  # HA time keeps the clock accurate long-term and acts as SNTP fallback.
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lambda: id(hems_eg1).refresh_heartbeat();

globals:
  - id: water_liter_per_pulse
    type: float
    restore_value: true
    initial_value: "${water_liters_per_pulse_default}"
  - id: water_total_m3
    type: float
    restore_value: true
    initial_value: "0.0"
  # Fronius Batterie-Entladesteuerung
  - id: include_meter_ev
    type: bool
    restore_value: False
    initial_value: "false"
  - id: include_meter_hp
    type: bool
    restore_value: true
    initial_value: "true"
  - id: include_meter_house
    type: bool
    restore_value: true
    initial_value: "true"
  # Scale Factors (werden alle 5s vom Device gelesen, kein restore nötig)
  - id: sf_ac_power
    type: int
    initial_value: "-1"
  - id: sf_solar_power
    type: int
    initial_value: "-1"
  - id: sf_grid_power
    type: int
    initial_value: "-1"
  - id: sf_ev_power
    type: int
    initial_value: "-1"
  - id: sf_hp_power
    type: int
    initial_value: "-1"
  - id: sf_grid_current
    type: int
    initial_value: "-1"
  - id: sf_ev_current
    type: int
    initial_value: "100"
  - id: sf_battery_power
    type: int
    initial_value: "-1"
  - id: sf_battery_soc
    type: int
    initial_value: "-1"
  - id: sf_outwrte
    type: int
    initial_value: "-2"

external_components:
  # Lokale native Implementierungen (ESP-IDF-kompatibel, kein Arduino-Lib):
  #   modbus_server: ersetzt thomase1234/esphome-fake-xemex-csmb (Arduino-only)
  #   modbustcp:     lokale Kopie mit Unit-ID-Fix
  - source:
      type: local
      path: components
    components:
      - modbus_server
      - modbustcp
      - eebus_eg1
      - eebus_lpc
  - source: github://creepystefan/esphome_modbus_tcp
    refresh: 1d
    components:
      - modbustcp_controller

# ── I²C Bus für TCA9554 (Relais-Expander) ───────────────────────────────────
i2c:
  id: i2c_bus
  sda: GPIO42
  scl: GPIO41
  scan: true
  frequency: 400kHz

# TCA9554 I/O-Expander (Adresse 0x20) – steuert die 8 Relais
pca9554:
  - id: relay_expander
    address: 0x20
    i2c_id: i2c_bus

# ── 8 Relais-Ausgänge (über TCA9554) ────────────────────────────────────────
switch:
  - platform: gpio
    name: "${device_name} Fronius §14a Leistungslimit"
    id: relay_1
    icon: mdi:transmission-tower-off
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 1
    pin:
      pca9554: relay_expander
      number: 0
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 2"
    id: relay_2
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 2
    pin:
      pca9554: relay_expander
      number: 1
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 3"
    id: relay_3
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 3
    pin:
      pca9554: relay_expander
      number: 2
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 4"
    id: relay_4
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 4
    pin:
      pca9554: relay_expander
      number: 3
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 5"
    id: relay_5
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 5
    pin:
      pca9554: relay_expander
      number: 4
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 6"
    id: relay_6
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 6
    pin:
      pca9554: relay_expander
      number: 5
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 7"
    id: relay_7
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 7
    pin:
      pca9554: relay_expander
      number: 6
      mode:
        output: true
      inverted: false

  - platform: gpio
    name: "${device_name} Relay 8"
    id: relay_8
    icon: mdi:electric-switch
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 8
    pin:
      pca9554: relay_expander
      number: 7
      mode:
        output: true
      inverted: false

  - platform: template
    name: "${device_name} §14a-Simulation (4200 W)"
    id: manual_enwg_test
    icon: "mdi:transmission-tower-import"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 2
    optimistic: true
    turn_on_action:
      - lambda: |-
          ESP_LOGW("enwg", "Simulation: Netzbetreiber aktiviert Leistungsbegrenzung 4200 W");
          float _ev = id(power_limit_events).state;
          id(power_limit_events).publish_state(std::isnan(_ev) ? 1.0f : _ev + 1.0f);
      - text_sensor.template.publish:
          id: last_enwg_event
          state: !lambda 'return std::string("Aktiviert (Sim): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
      - number.set:
          id: ct1addon
          value: 45.0
      - number.set:
          id: ct2addon
          value: 45.0
      - number.set:
          id: ct3addon
          value: 45.0
      - light.turn_on:
          id: status_led
          effect: "Paragraph14a Warning Flash"
      - switch.turn_on: relay_1
      - lambda: |-
          id(hems_eg1).set_limit(4200.0f);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("enwg", "Simulation: Netzbetreiber deaktiviert Leistungsbegrenzung");
      - text_sensor.template.publish:
          id: last_enwg_event
          state: !lambda 'return std::string("Beendet (Sim): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
      - number.set:
          id: ct1addon
          value: !lambda "return id(ladebegrenzung_addon);"
      - number.set:
          id: ct2addon
          value: !lambda "return id(ladebegrenzung_addon);"
      - number.set:
          id: ct3addon
          value: !lambda "return id(ladebegrenzung_addon);"
      - light.turn_off:
          id: status_led
      - switch.turn_off: relay_1
      - lambda: |-
          id(hems_eg1).clear_limit();

# ── Digitale Eingänge (opto-isoliert, active-low) ────────────────────────────
binary_sensor:
  # DI1 = §14a Steuereingang des Netzbetreibers (GPIO4)
  - platform: gpio
    name: "${device_name} §14a Grid Provider Switch"
    id: grid_provider_switch
    device_class: power
    icon: mdi:transmission-tower
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 1
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
      inverted: true  # Opto-Isolator: active-low
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:
      then:
        - lambda: |-
            float _ev = id(power_limit_events).state;
            id(power_limit_events).publish_state(std::isnan(_ev) ? 1.0f : _ev + 1.0f);
            ESP_LOGW("enwg", "§14a EnWG: Netzbetreiber aktiviert Leistungsbegrenzung (DI1)");
        - text_sensor.template.publish:
            id: last_enwg_event
            state: !lambda 'return std::string("Aktiviert (DI1): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
        - number.set:
            id: ct1addon
            value: 45.0
        - number.set:
            id: ct2addon
            value: 45.0
        - number.set:
            id: ct3addon
            value: 45.0
        - light.turn_on:
            id: status_led
            effect: "Paragraph14a Warning Flash"
        - switch.turn_on: relay_1
        - lambda: |-
            id(hems_eg1).set_limit(4200.0f);
    on_release:
      then:
        - lambda: |-
            ESP_LOGW("enwg", "§14a EnWG: Netzbetreiber deaktiviert Leistungsbegrenzung (DI1)");
        - text_sensor.template.publish:
            id: last_enwg_event
            state: !lambda 'return std::string("Beendet (DI1): ") + id(ha_time).now().strftime("%d.%m.%Y %H:%M:%S");'
        - number.set:
            id: ct1addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - number.set:
            id: ct2addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - number.set:
            id: ct3addon
            value: !lambda "return id(ladebegrenzung_addon);"
        - lambda: |-
            id(hems_eg1).clear_limit();
        - light.turn_off:
            id: status_led
        - switch.turn_off: relay_1

  - platform: gpio
    name: "${device_name} Digital Input 3"
    id: di_3
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 13
    pin:
      number: GPIO6
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "${device_name} Digital Input 4"
    id: di_4
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 14
    pin:
      number: GPIO7
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "${device_name} Digital Input 5"
    id: di_5
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 15
    pin:
      number: GPIO8
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "${device_name} Digital Input 6"
    id: di_6
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 16
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "${device_name} Digital Input 7"
    id: di_7
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 17
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "${device_name} Digital Input 8"
    id: di_8
    icon: mdi:electric-switch-closed
    web_server:
      sorting_group_id: sg_dido
      sorting_weight: 18
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true

# ── WS2812 Onboard RGB-LED (GPIO38) – §14a Statusanzeige + Normalbetrieb ────
# esp32_rmt_led_strip verwendet den neuen RMT-Treiber (driver_ng), kompatibel
# mit Arduino ESP32 Core 3.x – vermeidet den Legacy-RMT-Konflikt.
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO38
    num_leds: 1
    chipset: WS2812
    name: "${device_name} Status LED"
    id: status_led
    icon: mdi:led-on
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 3
    restore_mode: ALWAYS_OFF
    effects:
      - strobe:
          name: "Paragraph14a Warning Flash"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              brightness: 0%
              duration: 500ms

number:
  - platform: template
    name: "${device_name} Water Liters per Pulse"
    id: water_lpr_number
    icon: mdi:water-opacity
    web_server:
      sorting_group_id: sg_wasser
      sorting_weight: 3
    unit_of_measurement: "L/pulse"
    min_value: 0.1
    max_value: 100.0
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: "${water_liters_per_pulse_default}"
    set_action:
      - globals.set:
          id: water_liter_per_pulse
          value: !lambda "return x;"
      - logger.log:
          format: "Water meter: %.1f L/pulse"
          args: ["x"]

# ── Sensoren ──────────────────────────────────────────────────────────────────
sensor:
  # ── S0-Wasserzähler DI2 (GPIO5) ───────────────────────────────────────────
  # Liter-pro-Impuls über HA-Number konfigurierbar, Wert wird im Flash gespeichert
  - platform: pulse_meter
    name: "${device_name} Water Flow Rate"
    id: water_flow_rate
    icon: mdi:water-pump
    web_server:
      sorting_group_id: sg_wasser
      sorting_weight: 1
    unit_of_measurement: "L/min"
    device_class: water
    state_class: measurement
    accuracy_decimals: 2
    internal_filter: 10ms
    timeout: 10s
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true              # S0 active-low
    filters:
      - lambda: return x * id(water_liter_per_pulse);  # Impulse → L/min
    on_raw_value:
      - globals.set:
          id: water_total_m3
          value: !lambda "return id(water_total_m3) + id(water_liter_per_pulse) * 0.001f;"

  - platform: template
    name: "${device_name} Water Total"
    id: water_total
    icon: mdi:water
    web_server:
      sorting_group_id: sg_wasser
      sorting_weight: 2
    unit_of_measurement: "m³"
    device_class: water
    state_class: total_increasing
    accuracy_decimals: 3
    update_interval: 10s
    lambda: "return id(water_total_m3);"

  # ── CT-Ströme + Power-Events ──────────────────────────────────────────────
  - platform: template
    name: "${device_name} Power Limitation Events"
    id: power_limit_events
    icon: "mdi:counter"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 5
    unit_of_measurement: "events"
    state_class: "total_increasing"
    accuracy_decimals: 0

  # CT-Ströme werden jetzt direkt vom Fronius Grid Meter gelesen (fronius-gen24.yaml)
  # Die alten MQTT-Sensoren (wallbox/shellrecharge/1/ct*current) wurden entfernt.

# ── Text-Sensoren ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: version
    name: "${device_name} ESPHome Version"
    icon: "mdi:information"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 1
    hide_timestamp: true

  - platform: template
    name: "${device_name} Build-Zeit"
    id: build_time_sensor
    icon: "mdi:calendar-clock"
    entity_category: diagnostic
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 4
    update_interval: never

  - platform: template
    name: "${device_name} Letztes §14a-Ereignis"
    id: last_enwg_event
    icon: "mdi:clock-alert"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 6
    update_interval: never

  - platform: template
    name: "${device_name} §14a Status"
    id: enwg_status
    icon: "mdi:transmission-tower"
    web_server:
      sorting_group_id: sg_netz
      sorting_weight: 3
    update_interval: 2s
    lambda: |-
      if (id(hems_lpc).is_limit_active()) return {"Active - EEBus digital (CS)"};
      if (id(grid_provider_switch).state) return {"Active - Relay DI1"};
      if (id(manual_enwg_test).state)     return {"Active - Simulation 4200 W"};
      return {"Inactive - Normal Operation"};

# ── Buttons ───────────────────────────────────────────────────────────────────
button:
  - platform: restart
    name: "${device_name} Neustart"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 10

# ── Fronius Gen24 Plus 8.0: Modbus TCP Batterie-Entladesteuerung ──────────────
# Ausgelagert in separate Datei für saubere Struktur (vermeidet YAML-Key-Duplikate)
packages:
  xemex_csmb: !include xemex-csmb.yaml
  fronius: !include fronius-gen24.yaml
  eebus: !include eebus-openeebus.yaml

