# ══════════════════════════════════════════════════════════════════════════════
# Fronius Symo Gen24 Plus 8.0 – Modbus TCP Batterie-Entladesteuerung
# ══════════════════════════════════════════════════════════════════════════════
# Externe Komponente: github://creepystefan/esphome_modbus_tcp
# Verwendet modbustcp / modbustcp_controller (eigene YAML-Keys).
#
# Fronius IP: ${fronius_ip}, Port: ${fronius_port}
# Unit-IDs: 1 (Inverter), 200 (Grid Meter), 201 (EV Meter), 202 (HP Meter)
#
# WICHTIG: Register-Adressen sind firmware-abhängig!
# Prüfe im Fronius Web-UI unter: Kommunikation → Modbus → Register-Map
# SunSpec-Registerbasis kann bei unterschiedlicher FW abweichen.
#
# Battery: BYD HVS/HVM or Fronius Reserva — max discharge power configurable via ESPHome UI (id: battery_max_discharge_w, default 18176 W)
# ══════════════════════════════════════════════════════════════════════════════

substitutions:
  fronius_ip: !secret fronius_ip
  fronius_port: "502"

web_server:
  sorting_groups:
    - id: sg_fronius
      name: "Fronius"
      sorting_weight: 1

globals:
  # Zeitstempel des letzten erfolgreichen PowerFlow-API-Polls (Frische-Check)
  - id: pf_last_update_ms
    type: uint32_t
    initial_value: '0'
  - id: solar_power_last_update_ms
    type: uint32_t
    initial_value: '0'
  - id: house_power_last_update_ms
    type: uint32_t
    initial_value: '0'
  - id: ev_power_last_update_ms
    type: uint32_t
    initial_value: '0'
  - id: hp_power_last_update_ms
    type: uint32_t
    initial_value: '0'
  - id: discharge_limit_last_update_ms
    type: uint32_t
    initial_value: '0'
  # Fronius battery discharge control — booleans select which meters to include in SOC calculation
  - id: include_meter_ev
    type: bool
    restore_value: False
    initial_value: "false"
  - id: include_meter_hp
    type: bool
    restore_value: true
    initial_value: "true"
  - id: include_meter_house
    type: bool
    restore_value: true
    initial_value: "true"
  # Scale factors — read from device every 5 s; no NVS restore needed
  - id: sf_ac_power
    type: int
    initial_value: "-1"
  - id: sf_solar_power
    type: int
    initial_value: "-1"
  - id: sf_grid_power
    type: int
    initial_value: "-1"
  - id: sf_ev_power
    type: int
    initial_value: "-1"
  - id: sf_hp_power
    type: int
    initial_value: "-1"
  - id: sf_grid_current
    type: int
    initial_value: "-1"
  - id: sf_ev_current
    type: int
    initial_value: "100"
  - id: sf_battery_power
    type: int
    initial_value: "-1"
  - id: sf_battery_soc
    type: int
    initial_value: "-1"
  - id: sf_outwrte
    type: int
    initial_value: "-2"

http_request:
  useragent: "ESPHome"
  timeout: 3s

modbustcp:
  - id: fronius_modbus_tcp
    host: ${fronius_ip}
    port: ${fronius_port}
    send_wait_time: 200ms

modbustcp_controller:
  - id: fronius_inverter
    modbustcp_id: fronius_modbus_tcp
    address: 0x01
    update_interval: 2s
    command_throttle: 100ms
  - id: fronius_meter_grid
    modbustcp_id: fronius_modbus_tcp
    address: 0xF0
    update_interval: 2s
    command_throttle: 100ms
  - id: fronius_meter_ev
    modbustcp_id: fronius_modbus_tcp
    address: 0xF2
    update_interval: 1s
    command_throttle: 100ms
  - id: fronius_meter_hp
    modbustcp_id: fronius_modbus_tcp
    address: 0xF1
    update_interval: 2s
    command_throttle: 100ms

# ── Fronius Sensoren ──────────────────────────────────────────────────────────
sensor:
  # ── Fronius PowerFlow API: PV-Momentaufnahme (primäre Solarquelle) ──────────
  - platform: template
    name: "${device_name} Fronius PF PV"
    id: fronius_pf_pv
    internal: true
    unit_of_measurement: "W"
    update_interval: never

  # ── Wechselrichter: AC-Leistung (SunSpec Model 113) ─────────────────────────
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius AC Power"
    id: fronius_ac_power
    icon: "mdi:solar-power-variant"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 2
    register_type: holding
    address: 40083
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return x * pow(10, id(sf_ac_power));
      # Ausreisser verwerfen: Wert/SF-Paarung kann um einen Poll-Zyklus versetzt
      # sein (Faktor 10); Median glaettet Einzel-Fehlpaarungen und Lesefehler
      - lambda: 'return (fabsf(x) > 30000.0f) ? NAN : x;'
      - filter_out: nan
      - median:
          window_size: 3
          send_every: 1
          send_first_at: 1

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius AC Power SF"
    id: fronius_ac_power_sf
    register_type: holding
    address: 40084
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_ac_power) = (int)x;'

  # ── Wechselrichter: DC/Solar-Leistung (MPPT1 + MPPT2) ──────────────────────
  # Register 40274 = MPPT1_DCW, Register 40294 = MPPT2_DCW, SF at 40257
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    id: fronius_mppt1_power
    register_type: holding
    address: 40274
    value_type: U_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_solar_power));

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    id: fronius_mppt2_power
    register_type: holding
    address: 40294
    value_type: U_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_solar_power));

  - platform: template
    name: "${device_name} Fronius Solar Power"
    id: fronius_solar_power
    icon: "mdi:solar-panel"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 3
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      // Primärquelle: PowerFlow-API (atomar, ohne Skalenfaktoren)
      float pv = id(fronius_pf_pv).state;
      bool pf_fresh = (millis() - id(pf_last_update_ms)) <= 15000 && id(pf_last_update_ms) != 0;
      if (pf_fresh && !std::isnan(pv) && pv >= 0.0f && pv <= 25000.0f) return pv;
      // Fallback: Modbus MPPT-Summe
      float m1 = id(fronius_mppt1_power).state;
      float m2 = id(fronius_mppt2_power).state;
      if (std::isnan(m1) || std::isnan(m2)) return {};
      float p = m1 + m2;
      if (p < -100.0f || p > 25000.0f) return {};
      return p;
    update_interval: 2s
    on_value:
      then:
        - globals.set:
            id: solar_power_last_update_ms
            value: !lambda 'return millis();'

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius Solar Power SF"
    id: fronius_solar_power_sf
    register_type: holding
    address: 40257
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_solar_power) = (int)x;'

  # ── Smart Meter Grid (Unit 240): Gesamtleistung ─────────────────────────────
  # Register 40087 = W (Total Real Power), 40091 = W_SF (Scale Factor)
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Power"
    id: fronius_grid_power
    icon: "mdi:transmission-tower"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 4
    register_type: holding
    address: 40087
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return x * pow(10, id(sf_grid_power));
      # Ausreisser verwerfen: Wert/SF-Paarung kann um einen Poll-Zyklus versetzt
      # sein (Faktor 10); Median glaettet Einzel-Fehlpaarungen und Lesefehler
      - lambda: 'return (fabsf(x) > 30000.0f) ? NAN : x;'
      - filter_out: nan
      - median:
          window_size: 3
          send_every: 1
          send_first_at: 1

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Power SF"
    id: fronius_grid_power_sf
    register_type: holding
    address: 40091
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_grid_power) = (int)x;'

  # ── Smart Meter Grid: Phasenleistungen (SunSpec Model 203, Unit 240) ────────
  # Register 40088-40090 = WphA/B/C (signed), SF = 40091 (= sf_grid_power)
  # Dienen zur Vorzeichenbestimmung der Phasenströme (Strom-Register sind unsigned)
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    id: fronius_grid_power_a
    register_type: holding
    address: 40088
    value_type: S_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_grid_power));

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    id: fronius_grid_power_b
    register_type: holding
    address: 40089
    value_type: S_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_grid_power));

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    id: fronius_grid_power_c
    register_type: holding
    address: 40090
    value_type: S_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_grid_power));

  # ── Smart Meter Grid: Phasenströme (SunSpec Model 201, Unit 240) ────────────
  # Register 40072-40074 = AphA/B/C (unsigned!), 40075 = A_SF
  # Vorzeichen wird von WphA/B/C (40088-40090) übernommen: positiv=Bezug, negativ=Einspeisung
  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Current A"
    id: fronius_grid_current_a
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 5
    register_type: holding
    address: 40072
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          float current = x * pow(10, id(sf_grid_current));
          float power = id(fronius_grid_power_a).state;
          if (!std::isnan(power) && power < 0) current = -current;
          return current;

  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Current B"
    id: fronius_grid_current_b
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 6
    register_type: holding
    address: 40073
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          float current = x * pow(10, id(sf_grid_current));
          float power = id(fronius_grid_power_b).state;
          if (!std::isnan(power) && power < 0) current = -current;
          return current;

  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Current C"
    id: fronius_grid_current_c
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 7
    register_type: holding
    address: 40074
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          float current = x * pow(10, id(sf_grid_current));
          float power = id(fronius_grid_power_c).state;
          if (!std::isnan(power) && power < 0) current = -current;
          return current;

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_grid
    name: "${device_name} Fronius Grid Current SF"
    id: fronius_grid_current_sf
    register_type: holding
    address: 40075
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_grid_current) = (int)x;'

  # ── Smart Meter EV/Wallbox (Unit 241): Leistung ─────────────────────────────
  # Gleiche Register wie Grid Meter, aber andere Unit-ID
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Power"
    id: fronius_ev_power
    icon: "mdi:ev-station"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 8
    register_type: holding
    address: 40087
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return -x * pow(10, id(sf_ev_power));
      # Ausreisser verwerfen: Wert/SF-Paarung kann um einen Poll-Zyklus versetzt
      # sein (Faktor 10); Median glaettet Einzel-Fehlpaarungen und Lesefehler
      - lambda: 'return (fabsf(x) > 30000.0f) ? NAN : x;'
      - filter_out: nan
      - median:
          window_size: 3
          send_every: 1
          send_first_at: 1
    on_value:
      then:
        - globals.set:
            id: ev_power_last_update_ms
            value: !lambda 'return millis();'

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Power SF"
    id: fronius_ev_power_sf
    register_type: holding
    address: 40091
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_ev_power) = (int)x;'

  # ── Smart Meter EV/Wallbox: Phasenströme (SunSpec Model 201, Unit 241) ───────
  # SF zuerst lesen (40075), damit sf_ev_current bekannt ist bevor die
  # Stromregister (40072-40074) verarbeitet werden. Initial-Sentinel 100
  # → Filter gibt NAN zurück bis SF korrekt gelesen wurde.
  # EV-Meter liefert SF=-5, daher SunSpec-Range -10..10 statt -4..4.
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Current SF"
    id: fronius_ev_current_sf
    register_type: holding
    address: 40075
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -10 && (int)x <= 10) id(sf_ev_current) = (int)x;'

  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Current A"
    id: fronius_ev_current_a
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 7
    register_type: holding
    address: 40072
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (id(sf_ev_current) > 10 || id(sf_ev_current) < -10) return NAN;
          float current = std::abs(x * pow(10, id(sf_ev_current)));
          if (current > 32.0f) return NAN;
          float power = std::abs(id(fronius_ev_power).state);
          if (!std::isnan(power) && power > 1000.0f) {
            float expected = power / 693.0f;
            float tolerance = std::max(3.0f, expected * 0.5f);
            if (std::abs(current - expected) > tolerance) return NAN;
          }
          return current;
      - filter_out: nan
    on_value:
      then:
        - number.set:
            id: ct1current
            value: !lambda |-
              float addon = id(ct1addon).state;
              float target = std::max(0.0f, x) + addon;
              constexpr float control_threshold = 47.4f;
              constexpr float control_gain = 0.2f;
              float power = std::abs(id(fronius_ev_power).state);
              if (addon <= 1.0f || addon >= 47.3f) return target;
              if (std::isnan(power) || power < 5000.0f) return target;
              return control_threshold + (target - control_threshold) * control_gain;

  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Current B"
    id: fronius_ev_current_b
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 8
    register_type: holding
    address: 40073
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (id(sf_ev_current) > 10 || id(sf_ev_current) < -10) return NAN;
          float current = std::abs(x * pow(10, id(sf_ev_current)));
          if (current > 32.0f) return NAN;
          float power = std::abs(id(fronius_ev_power).state);
          if (!std::isnan(power) && power > 1000.0f) {
            float expected = power / 693.0f;
            float tolerance = std::max(3.0f, expected * 0.5f);
            if (std::abs(current - expected) > tolerance) return NAN;
          }
          return current;
      - filter_out: nan
    on_value:
      then:
        - number.set:
            id: ct2current
            value: !lambda |-
              float addon = id(ct2addon).state;
              float target = std::max(0.0f, x) + addon;
              constexpr float control_threshold = 47.4f;
              constexpr float control_gain = 0.2f;
              float power = std::abs(id(fronius_ev_power).state);
              if (addon <= 1.0f || addon >= 47.3f) return target;
              if (std::isnan(power) || power < 5000.0f) return target;
              return control_threshold + (target - control_threshold) * control_gain;

  - platform: modbustcp_controller
    disabled_by_default: true
    modbustcp_controller_id: fronius_meter_ev
    name: "${device_name} Fronius EV Current C"
    id: fronius_ev_current_c
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 9
    register_type: holding
    address: 40074
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (id(sf_ev_current) > 10 || id(sf_ev_current) < -10) return NAN;
          float current = std::abs(x * pow(10, id(sf_ev_current)));
          if (current > 32.0f) return NAN;
          float power = std::abs(id(fronius_ev_power).state);
          if (!std::isnan(power) && power > 1000.0f) {
            float expected = power / 693.0f;
            float tolerance = std::max(3.0f, expected * 0.5f);
            if (std::abs(current - expected) > tolerance) return NAN;
          }
          return current;
      - filter_out: nan
    on_value:
      then:
        - number.set:
            id: ct3current
            value: !lambda |-
              float addon = id(ct3addon).state;
              float target = std::max(0.0f, x) + addon;
              constexpr float control_threshold = 47.4f;
              constexpr float control_gain = 0.2f;
              float power = std::abs(id(fronius_ev_power).state);
              if (addon <= 1.0f || addon >= 47.3f) return target;
              if (std::isnan(power) || power < 5000.0f) return target;
              return control_threshold + (target - control_threshold) * control_gain;

  # ── Smart Meter Wärmepumpe (Unit 242): Leistung ─────────────────────────────
  # Gleiche Register wie Grid Meter, aber andere Unit-ID
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_hp
    name: "${device_name} Fronius HP Power"
    id: fronius_hp_power
    icon: "mdi:heat-pump"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 9
    register_type: holding
    address: 40087
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return -x * pow(10, id(sf_hp_power));
      # Ausreisser verwerfen: Wert/SF-Paarung kann um einen Poll-Zyklus versetzt
      # sein (Faktor 10); Median glaettet Einzel-Fehlpaarungen und Lesefehler
      - lambda: 'return (fabsf(x) > 30000.0f) ? NAN : x;'
      - filter_out: nan
      - median:
          window_size: 3
          send_every: 1
          send_first_at: 1
    on_value:
      then:
        - globals.set:
            id: hp_power_last_update_ms
            value: !lambda 'return millis();'

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_meter_hp
    name: "${device_name} Fronius HP Power SF"
    id: fronius_hp_power_sf
    register_type: holding
    address: 40091
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_hp_power) = (int)x;'

  # ── Template: Haus-Leistung (Verbrauch ohne EV/HP/Ohmpilot) ───────────────────
  # house = ac + grid - ev - hp - ohm
  # AC Power beinhaltet bereits Solar + Battery (Inverter DC→AC)
  # Alle Werte folgen Konvention: positiv=Bezug/Verbrauch/Entladung
  - platform: template
    name: "${device_name} Fronius House Power"
    id: fronius_house_power
    icon: "mdi:home-lightning-bolt"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 10
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      // Modbus: AC + Grid - EV - HP - Ohm
      // Alle Einzelsensoren haben bereits Median-Filter gegen SF-Ausreisser.
      // Der Median(5) auf dem Ergebnis glaettet Transitionen-Artefakte:
      // Wenn EV oder AC sich aendern, aktualisieren die Modbus-Register
      // nicht exakt gleichzeitig (100ms command_throttle) — fuer 1-2 Zyklen
      // kann die Differenz kurzzeitig springen.
      float ac = id(fronius_ac_power).state;
      float grid = id(fronius_grid_power).state;
      float ev = id(fronius_ev_power).state;
      float hp = id(fronius_hp_power).state;
      float ohm = id(fronius_ohmpilot_power).state;
      if (std::isnan(ac) || std::isnan(grid) || std::isnan(ev) || std::isnan(hp)) return {};
      if (std::isnan(ohm)) ohm = 0;
      return std::max(0.0f, ac + grid - ev - hp - ohm);
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
    on_value:
      then:
        - globals.set:
            id: house_power_last_update_ms
            value: !lambda 'return millis();'

  # ── Template: Schaltbare Leistungssumme ─────────────────────────────────────
  # Summe der aktivierten Verbraucher (House, EV, HP)
  - platform: template
    name: "${device_name} Fronius Switchable Power"
    id: fronius_power_sum
    icon: "mdi:power-plug"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 11
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      float sum = 0;
      float house = id(fronius_house_power).state;
      float ev = id(fronius_ev_power).state;
      float hp = id(fronius_hp_power).state;
      if (id(include_meter_house) && !std::isnan(house) && !std::isinf(house)) sum += house;
      if (id(include_meter_ev) && !std::isnan(ev) && !std::isinf(ev)) sum += ev;
      if (id(include_meter_hp) && !std::isnan(hp) && !std::isinf(hp)) sum += hp;
      return sum;

  # ── Ohmpilot: Leistung (via Fronius Solar API) ──────────────────────────────
  # Wird NICHT in die Discharge-Limit-Berechnung einbezogen,
  # da der Ohmpilot ausschließlich mit Überschuss arbeitet.
  - platform: template
    name: "${device_name} Fronius Ohmpilot Power"
    id: fronius_ohmpilot_power
    icon: "mdi:resistor"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 15
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    name: "${device_name} Fronius Ohmpilot Temperature"
    id: fronius_ohmpilot_temp
    icon: "mdi:thermometer"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 16
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never

  # ── Battery discharge limit (%) ─────────────────────────────────────────────
  # deficit = sum(active consumers) - solar; if > 0 → battery must supply
  # OutWRte = deficit / battery_max_discharge_w * 100, capped at 100%
  - platform: template
    name: "${device_name} Fronius Discharge Limit"
    id: fronius_discharge_limit
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 13
    unit_of_measurement: "%"
    icon: "mdi:battery-arrow-down"
    accuracy_decimals: 1
    update_interval: 2s
    lambda: |-
      const uint32_t now = millis();
      const uint32_t max_age_ms = 10000;
      if (id(solar_power_last_update_ms) == 0 || now - id(solar_power_last_update_ms) > max_age_ms ||
          id(house_power_last_update_ms) == 0 || now - id(house_power_last_update_ms) > max_age_ms ||
          id(ev_power_last_update_ms) == 0 || now - id(ev_power_last_update_ms) > max_age_ms ||
          id(hp_power_last_update_ms) == 0 || now - id(hp_power_last_update_ms) > max_age_ms) {
        return {};
      }

      float solar = id(fronius_solar_power).state;
      float house = id(fronius_house_power).state;
      float ev = id(fronius_ev_power).state;
      float hp = id(fronius_hp_power).state;
      if (!std::isfinite(solar) || !std::isfinite(house) ||
          !std::isfinite(ev) || !std::isfinite(hp)) return {};

      // Check if a disabled consumer is drawing >30 W (discharge limiting needed)
      bool limit_needed = false;
      if (!id(include_meter_house) && house > 30) limit_needed = true;
      if (!id(include_meter_ev) && ev > 30) limit_needed = true;
      if (!id(include_meter_hp) && hp > 30) limit_needed = true;

      // No limiting needed — Batterie-State wird NICHT geprüft, da
      // battery < 0 → 100% → Entladung frei → battery > 0 → 0% eine
      // Oszillation erzeugt.
      if (!limit_needed) {
        return 100.0f;
      }

      // Sum of active consumers
      float consumers = 0;
      if (id(include_meter_house)) consumers += house;
      if (id(include_meter_ev)) consumers += ev;
      if (id(include_meter_hp)) consumers += hp;

      float deficit = consumers - solar;

      if (deficit <= 0) {
        return 0.0f;  // solar covers all — no battery discharge needed
      }

      float percentage = deficit / id(battery_max_discharge_w).state * 100.0f;
      return std::min(100.0f, percentage);
    on_value:
      then:
        - globals.set:
            id: discharge_limit_last_update_ms
            value: !lambda 'return millis();'
  # ── Wechselrichter: Batterie DC-Leistung ────────────────────────────────────
  # Register 40314 = DC Power Charge (U_WORD), SF at 40257
  # Register 40334 = DC Power Discharge (U_WORD), SF at 40257
  # Kombiniert: positiv = Entladung, negativ = Ladung
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    id: fronius_battery_charge_raw
    register_type: holding
    address: 40314
    value_type: U_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_battery_power));

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    id: fronius_battery_discharge_raw
    register_type: holding
    address: 40334
    value_type: U_WORD
    internal: true
    filters:
      - lambda: |-
          return x * pow(10, id(sf_battery_power));

  - platform: template
    name: "${device_name} Fronius Battery Power"
    id: fronius_battery_power
    icon: "mdi:battery-charging"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 12
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      return id(fronius_battery_discharge_raw).state - id(fronius_battery_charge_raw).state;
    update_interval: 2s

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius Battery Power SF"
    id: fronius_battery_power_sf
    register_type: holding
    address: 40257
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_battery_power) = (int)x;'

  # ── Wechselrichter: Battery SOC (SunSpec Storage) ────────────────────────
  # Register 40351 = ChaState (%), SF at 40365
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius Battery SOC"
    id: fronius_battery_soc
    icon: "mdi:battery"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 14
    register_type: holding
    address: 40351
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return x * pow(10, id(sf_battery_soc));

  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius Battery SOC SF"
    id: fronius_battery_soc_sf
    register_type: holding
    address: 40365
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_battery_soc) = (int)x;'

  # ── InOutWRte Scale Factor (Register 40368) ───────────────────────────────
  - platform: modbustcp_controller
    modbustcp_controller_id: fronius_inverter
    name: "${device_name} Fronius OutWRte SF"
    id: fronius_outwrte_sf
    register_type: holding
    address: 40368
    value_type: S_WORD
    internal: true
    on_value:
      then:
        - lambda: 'if ((int)x >= -4 && (int)x <= 4) id(sf_outwrte) = (int)x;'

# ── Storage Control: OutWRte schreiben (jede 5 Sekunden) ─────────────────
# Verifizierte Register aus ioBroker:
# 40348 = StorCtl_Mod (Storage Control Mode, Bit 1 = Discharge Limit aktiv)
# 40355 = OutWRte (Percent of max discharge rate, S16, in %)
# 40368 = InOutWRte_SF (Scale Factor für OutWRte/InWRte)
interval:
  - interval: 5s
    then:
      - lambda: |-
          float pct = id(fronius_discharge_limit).state;
          const bool fresh = id(discharge_limit_last_update_ms) != 0 &&
                             millis() - id(discharge_limit_last_update_ms) <= 10000;
          static bool stale_logged = false;
          if (!fresh || !std::isfinite(pct)) {
            if (!stale_logged) {
              ESP_LOGW("fronius", "Entladegrenze wird nicht geschrieben: Leistungsdaten sind veraltet");
              stale_logged = true;
            }
            return;
          }
          if (stale_logged) {
            ESP_LOGI("fronius", "Leistungsdaten wieder aktuell, Entladesteuerung wird fortgesetzt");
            stale_logged = false;
          }

          // OutWRte: Registerwert = pct / 10^SF (SF ist typisch -2 bei Fronius)
          int16_t outwrte_val = (int16_t)(pct / pow(10, id(sf_outwrte)));

          modbustcp_controller::ModbusTCPController *controller = id(fronius_inverter);

          if (pct < 100.0f) {
            // Entladebegrenzung aktiv: StorCtl_Mod Bit 1 setzen (= 2)
            std::vector<uint16_t> stor_cmd = {2};
            auto cmd1 = modbustcp_controller::ModbusCommandItem::create_write_multiple_command(
              controller, 40348, 1, stor_cmd);
            controller->queue_command(cmd1);

            // OutWRte schreiben (Register 40355)
            std::vector<uint16_t> out_cmd = {(uint16_t)outwrte_val};
            auto cmd2 = modbustcp_controller::ModbusCommandItem::create_write_multiple_command(
              controller, 40355, 1, out_cmd);
            controller->queue_command(cmd2);
          } else {
            // Keine Begrenzung: StorCtl_Mod = 0
            std::vector<uint16_t> stor_cmd = {0};
            auto cmd = modbustcp_controller::ModbusCommandItem::create_write_multiple_command(
              controller, 40348, 1, stor_cmd);
            controller->queue_command(cmd);
          }

  # ── PowerFlow: HTTP-Poll der Fronius Solar API (atomarer Snapshot) ──────────
  - interval: 5s
    then:
      - http_request.get:
          url: "http://${fronius_ip}/solar_api/v1/GetPowerFlowRealtimeData.fcgi"
          capture_response: true
          max_response_buffer_size: 4096
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      JsonObject site = root["Body"]["Data"]["Site"];
                      float pv   = site["P_PV"]   | 0.0f;   // null bei Nacht -> 0
                      id(fronius_pf_pv).publish_state(pv < 0 ? 0 : pv);
                      id(pf_last_update_ms) = millis();
                      return true;
                    });
                  }

  # ── Ohmpilot: HTTP-Poll der Fronius Solar API ────────────────────────────────
  - interval: 10s
    then:
      - http_request.get:
          url: "http://${fronius_ip}/solar_api/v1/GetOhmPilotRealtimeData.cgi"
          capture_response: true
          max_response_buffer_size: 1024
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      JsonObject data = root["Body"]["Data"]["0"];
                      float power = data["PowerReal_PAC_Sum"] | 0.0f;
                      float temp = data["Temperature_Channel_1"] | NAN;
                      id(fronius_ohmpilot_power).publish_state(power);
                      if (!std::isnan(temp)) {
                        id(fronius_ohmpilot_temp).publish_state(temp);
                      }
                      return true;
                    });
                  }

number:
  - platform: template
    disabled_by_default: true
    name: "${device_name} Battery Max Discharge Power"
    id: battery_max_discharge_w
    icon: "mdi:battery-arrow-down"
    web_server:
      sorting_group_id: sg_fronius
      sorting_weight: 20
    entity_category: config
    unit_of_measurement: "W"
    min_value: 1000
    max_value: 50000
    step: 100
    initial_value: 18176
    restore_value: true
    optimistic: true

# ── Battery discharge control switches ────────────────────────────────────────
switch:
  - platform: template
    disabled_by_default: true
