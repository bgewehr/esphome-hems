    initial_value: 0
    set_action:
      then:
        - number.set:
            id: ct2current
            value: !lambda "return std::max(0.0f, id(fronius_ev_current_b).state) + x;"

  - platform: template
    name: "${device_name} CT3 Addon"
    id: ct3addon
    icon: "mdi:plus-circle"
    web_server:
      sorting_group_id: sg_wallbox
