# Xemex CSMB Modbus RTU server emulation.
# RS485 UART, Modbus holding-register map, CT current controls and EV charging limit.

web_server:
  sorting_groups:
    - id: sg_wallbox
      name: "Xemex CSMB"
      sorting_weight: 2

globals:
  # Abgeleiteter Wert: wird beim Boot und bei jeder Slider-Aenderung aus
  # ev_limit_w berechnet — KEIN eigener NVS-Restore (sonst ueberlebt ein
  # veralteter Wert den Slider-Restore und wird beim Limit-Ende angewendet)
  - id: ladebegrenzung_addon
    type: float
    initial_value: "1.0"

# Boot: Global + CT-Addons einmalig aus dem (NVS-restaurierten) Slider ableiten
esphome:
  on_boot:
    - priority: -100.0
      then:
        - lambda: |-
            float w = id(ev_limit_w).state;
            if (std::isnan(w)) w = 11500.0f;
            float amps = w / 693.0f;
            float addon;
            if (w >= 11400.0f)     addon = 1.0f;
            else if (amps < 6.0f)  addon = 47.4f;
            else                   addon = 50.0f - amps - 2.6f;
            id(ladebegrenzung_addon) = addon;
            if (!id(hems_cs).is_limit_active()) {
              id(ct1addon).make_call().set_value(addon).perform();
              id(ct2addon).make_call().set_value(addon).perform();
              id(ct3addon).make_call().set_value(addon).perform();
            }

# TX=GPIO17 (DE/DI zum RS485-Chip), RX=GPIO18 (RO vom RS485-Chip)
uart:
  - id: intmodbus
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 9600
    stop_bits: 1
    data_bits: 8
    parity: EVEN

# ── Xemex CSMB Modbus-Server ─────────────────────────────────────────────────
modbus_server:
  - id: modbusserver
    uart_id: intmodbus
    address: 1
    holding_registers:
      - start_address: 0x4000   # Serial Number Part 1 "MX"
        default: 0x4D58
        number: 1

      - start_address: 0x4001   # Serial Number Part 2
        default: 0x5C6F
        number: 1

      - start_address: 0x4002   # Device Code
        default: 20802
        number: 1

      - start_address: 0x4003   # Device Address
        default: 0x1
        number: 1

      - start_address: 0x4004   # RS485 Baudrate Low
        default: 9600
        number: 1

      - start_address: 0x4005   # Protocol Version (FLOAT Hi)
        default: 0x3f80
        number: 1

      - start_address: 0x4006   # Protocol Version (FLOAT Lo)
        default: 0x0000
        number: 1

      - start_address: 0x4007   # Software Version 2.5 (FLOAT Hi)
        default: 0x4020
        number: 1

      - start_address: 0x4008   # Software Version 2.5 (FLOAT Lo)
        default: 0x0000
        number: 1

      - start_address: 0x4009   # Hardware Version 1.0 (FLOAT Hi)
        default: 0x3F80
        number: 1

      - start_address: 0x400A   # Hardware Version 1.0 (FLOAT Lo)
        default: 0x0000
        number: 1

      - start_address: 0x400B   # Meter Amps
        default: 80
        number: 1

      - start_address: 0x400C   # CT Ratio
        default: 2000
        number: 1

      - start_address: 0x400D   # RS485 Line Settings
        default: 36
        number: 1

      - start_address: 0x400E   # RS485 Line Termination
        default: 1
        number: 1

      - start_address: 0x400F   # RS485 Baudrate High
        default: 0
        number: 1

      - start_address: 0x500C   # RMS Current CT1 (FLOAT Hi)
        default: 0x0000
        number: 1

      - start_address: 0x500D   # RMS Current CT1 (FLOAT Lo)
        default: 0x0000
        number: 1

      - start_address: 0x500E   # RMS Current CT2 (FLOAT Hi)
        default: 0x3E73
        number: 1

      - start_address: 0x500F   # RMS Current CT2 (FLOAT Lo)
        default: 0x4333
        number: 1

      - start_address: 0x5010   # RMS Current CT3 (FLOAT Hi)
        default: 0x3E09
        number: 1

      - start_address: 0x5011   # RMS Current CT3 (FLOAT Lo)
        default: 0x399A
        number: 1

# ── EV Leistungsbegrenzung ────────────────────────────────────────────────────
# Kontinuierlicher W-Slider statt Dropdown — gleiche Behandlung wie die
# Leistungsgrenzen der anderen SteuVE. Umrechnung W -> Addon-Ampere:
#   amps  = W / 693        (3 Phasen x 231 V)
#   addon = 50 - amps - 2.6  (2.0 A Sicherheitspuffer + 0.6 A Kalibrierabsenkung)
# Unter 6 A pausiert die Wallbox -> Addon 47.4 stoppt das Laden;
# ab ~11.4 kW gilt "unbegrenzt" (Addon 1.0, Fahrzeug limitiert selbst).
# Ändert die CT-Addons NUR wenn §14a nicht aktiv ist; während eines aktiven
# Limits setzt der Budget-Verteiler (netzdienliche-steuerung.yaml) die Addons
# aus dem EV-Anteil.
number:
  - platform: template
    name: "${device_name} EV Leistungsbegrenzung"
    id: ev_limit_w
    icon: "mdi:ev-station"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 10
    unit_of_measurement: "W"
    min_value: 0
    max_value: 11500
    step: 100
    initial_value: 11500
    restore_value: true
    optimistic: true
    mode: slider
    on_value:
      then:
        - lambda: |-
            float amps = x / 693.0f;
            float addon;
            if (x >= 11400.0f)     addon = 1.0f;   // unbegrenzt
            else if (amps < 6.0f)  addon = 47.4f;  // Wallbox pausiert unter 6 A
            else                   addon = 50.0f - amps - 2.6f;
            id(ladebegrenzung_addon) = addon;
            if (!id(hems_cs).is_limit_active() &&
                !id(grid_provider_switch).state &&
                !id(manual_enwg_test).state) {
              id(ct1addon).make_call().set_value(addon).perform();
              id(ct2addon).make_call().set_value(addon).perform();
              id(ct3addon).make_call().set_value(addon).perform();
            }

  # --- EV Budget-Verteilung (analog EG1/EG2, weights 11-13) ---
  - platform: template
    name: "${device_name} EV Budget Priorität"
    id: ev_budget_prio
    icon: "mdi:sort-numeric-ascending"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 11
    entity_category: config
    min_value: 1
    max_value: 9
    step: 1
    initial_value: 2
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EV Budget Min"
    id: ev_budget_min
    icon: "mdi:arrow-collapse-down"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 12
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 11500
    step: 100
    initial_value: 0
    restore_value: true
    optimistic: true

  - platform: template
    name: "${device_name} EV Budget Max"
    id: ev_budget_max
    icon: "mdi:arrow-collapse-up"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 13
    entity_category: config
    unit_of_measurement: "W"
    min_value: 0
    max_value: 11500
    step: 100
    initial_value: 11000
    restore_value: true
    optimistic: true

# ── CT-Strom-Regler (Xemex Modbus-Register) ──────────────────────────────────
  - platform: template
    name: "${device_name} CT1 Current"
    id: ct1current
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 1
    optimistic: false
    update_interval: 2s
    min_value: 0
    max_value: 80
    step: 0.1
    unit_of_measurement: A
    set_action:
      then:
        - lambda: |-
            ESP_LOGI("modbus-server-xemex", "CT1 Current set to: %f A", x);
            union { uint16_t x_int[2]; float x_f; } u;
            u.x_f = x;
            if (modbusserver != nullptr) {
              modbusserver->write_holding_register(0x500C, u.x_int[1]);
              modbusserver->write_holding_register(0x500D, u.x_int[0]);
              ESP_LOGI("modbus-server-xemex", "CT1 updated: 0x500C=0x%04x, 0x500D=0x%04x", u.x_int[1], u.x_int[0]);
            } else {
              ESP_LOGE("modbus-server-xemex", "CT1 ERROR: modbus server is null!");
            }
            id(ct1current).publish_state(x);

  - platform: template
    name: "${device_name} CT2 Current"
    id: ct2current
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 2
    optimistic: false
    update_interval: 2s
    min_value: 0
    max_value: 80
    step: 0.1
    unit_of_measurement: A
    set_action:
      then:
        - lambda: |-
            ESP_LOGI("modbus-server-xemex", "CT2 Current set to: %f A", x);
            union { uint16_t x_int[2]; float x_f; } u;
            u.x_f = x;
            if (modbusserver != nullptr) {
              modbusserver->write_holding_register(0x500E, u.x_int[1]);
              modbusserver->write_holding_register(0x500F, u.x_int[0]);
              ESP_LOGI("modbus-server-xemex", "CT2 updated: 0x500E=0x%04x, 0x500F=0x%04x", u.x_int[1], u.x_int[0]);
            } else {
              ESP_LOGE("modbus-server-xemex", "CT2 ERROR: modbus server is null!");
            }
            id(ct2current).publish_state(x);

  - platform: template
    name: "${device_name} CT3 Current"
    id: ct3current
    icon: "mdi:current-ac"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 3
    optimistic: false
    update_interval: 2s
    min_value: 0
    max_value: 80
    step: 0.1
    unit_of_measurement: A
    set_action:
      then:
        - lambda: |-
            ESP_LOGI("modbus-server-xemex", "CT3 Current set to: %f A", x);
            union { uint16_t x_int[2]; float x_f; } u;
            u.x_f = x;
            if (modbusserver != nullptr) {
              modbusserver->write_holding_register(0x5010, u.x_int[1]);
              modbusserver->write_holding_register(0x5011, u.x_int[0]);
              ESP_LOGI("modbus-server-xemex", "CT3 updated: 0x5010=0x%04x, 0x5011=0x%04x", u.x_int[1], u.x_int[0]);
            } else {
              ESP_LOGE("modbus-server-xemex", "CT3 ERROR: modbus server is null!");
            }
            id(ct3current).publish_state(x);

  - platform: template
    name: "${device_name} CT1 Addon"
    id: ct1addon
    icon: "mdi:plus-circle"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 4
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    unit_of_measurement: A
    initial_value: 0
    set_action:
      then:
        - number.set:
            id: ct1current
            value: !lambda "return std::max(0.0f, id(fronius_ev_current_a).state) + x;"

  - platform: template
    name: "${device_name} CT2 Addon"
    id: ct2addon
    icon: "mdi:plus-circle"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 5
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    unit_of_measurement: A
    initial_value: 0
    set_action:
      then:
        - number.set:
            id: ct2current
            value: !lambda "return std::max(0.0f, id(fronius_ev_current_b).state) + x;"

  - platform: template
    name: "${device_name} CT3 Addon"
    id: ct3addon
    icon: "mdi:plus-circle"
    web_server:
      sorting_group_id: sg_wallbox
      sorting_weight: 6
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
